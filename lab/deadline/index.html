<script>
(function() {
  const { useState, useEffect, useRef, useMemo } = React;
  const h = htm.bind(React.createElement);

   
  const STORAGE_KEY = 'dt_deadline_v5';
  const DONE_KEY = 'dt_deadline_done_v5';
  const BLOB_KEY = 'dt_deadline_blob_id';
  const SHORTCODE_BLOB = '';
  const APP_KEY = 'deadline';

  const PERIOD_TIMES = {
    1: "08:50",
    2: "10:30",
    3: "13:00",
    4: "14:40",
    5: "16:20",
    "end": "23:59"
  };

  const PRIORITY_ORDER = { high: 0, mid: 1, low: 2 };
  const PRIORITY_LABEL = { high: '▲ 高', mid: '⬡ 普通', low: '▽ 低' };

  const DEFAULT_KEY = '$2a$10$iVNuU6AA4DGWLiU8/Gl.oOIvr166q/dgd995DrQ1ziA/9eSq7Fh7q';
  const getJbKey = () => {
    if (window.PWAConfigSync) {
      return window.PWAConfigSync.getApiKey();
    }
    return DEFAULT_KEY;
  };

  const binUrl = (id) => `https://api.jsonbin.io/v3/b/${id}/latest`;
  const binPut = (id) => `https://api.jsonbin.io/v3/b/${id}`;

  function App() {
    
    const [tasks, setTasks] = useState([]);
    const [doneTasks, setDoneTasks] = useState([]);
    const [blobId, setBlobId] = useState(() => SHORTCODE_BLOB || localStorage.getItem(BLOB_KEY) || null);
    const [syncStatus, setSyncStatus] = useState(blobId ? 'ok' : 'local');
    const [showConfig, setShowConfig] = useState(false);
    const [showAddModal, setShowAddModal] = useState(false);
    
    
    const [viewMode, setViewMode] = useState('kanban'); 
    const [filterType, setFilterType] = useState('all'); 
    const [searchQuery, setSearchQuery] = useState('');
    const [sortBy, setSortBy] = useState('due'); 

    
    const [ticker, setTicker] = useState(0);

    
    const [newTitle, setNewTitle] = useState('');
    const [newSubject, setNewSubject] = useState('');
    const [newPriority, setNewPriority] = useState('mid');
    const [newDate, setNewDate] = useState('');
    const [newPeriod, setNewPeriod] = useState('end');
    const [newMemo, setNewMemo] = useState('');

    
    const [toastMsg, setToastMsg] = useState('');
    const [toastShow, setToastShow] = useState(false);
    const toastTimerRef = useRef(null);

    
    useEffect(() => {
      const interval = setInterval(() => {
        setTicker(t => t + 1);
      }, 30000); 
      return () => clearInterval(interval);
    }, []);

    
    useEffect(() => {
      let localTasks = [];
      let localDone = [];
      try {
        localTasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch (e) {}
      try {
        localDone = JSON.parse(localStorage.getItem(DONE_KEY)) || [];
      } catch (e) {}

      
      const sanitizedTasks = localTasks.map(t => ({
        ...t,
        status: t.status || 'todo'
      }));

      setTasks(sanitizedTasks);
      setDoneTasks(localDone);
    }, []);

    
    useEffect(() => {
      async function checkSync() {
        let currentBlobId = blobId;
        if (window.PWAConfigSync) {
          currentBlobId = await window.PWAConfigSync.syncAppBinId('deadline', blobId);
          if (currentBlobId !== blobId) {
            setBlobId(currentBlobId);
            if (currentBlobId) {
              localStorage.setItem(BLOB_KEY, currentBlobId);
            } else {
              localStorage.removeItem(BLOB_KEY);
            }
          }
        }
        if (currentBlobId) {
          syncCloud(true, currentBlobId);
        }
      }
      checkSync();
    }, []);

    
    const triggerToast = (msg) => {
      setToastMsg(msg);
      setToastShow(true);
      clearTimeout(toastTimerRef.current);
      toastTimerRef.current = setTimeout(() => {
        setToastShow(false);
      }, 2500);
    };

    
    const saveLocal = (nextTasks, nextDone) => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nextTasks));
        localStorage.setItem(DONE_KEY, JSON.stringify(nextDone));
      } catch (e) {}
    };

    
    const syncCloud = async (silent = false, customBlobId = null) => {
      setSyncStatus('busy');
      const targetBlobId = customBlobId !== null ? customBlobId : blobId;
      const jbKey = getJbKey();

      try {
        if (!targetBlobId) {
          
          const res = await fetch('https://api.jsonbin.io/v3/b', {
            method: 'POST',
            headers: {
              'X-Master-Key': jbKey,
              'Content-Type': 'application/json',
              'X-Bin-Name': 'deadline_survival'
            },
            body: JSON.stringify({ tasks, doneTasks })
          });
          if (!res.ok) throw new Error('create failed: ' + res.status);
          const json = await res.json();
          const nextId = json.metadata.id;
          setBlobId(nextId);
          localStorage.setItem(BLOB_KEY, nextId);
          if (window.PWAConfigSync) {
            await window.PWAConfigSync.syncAppBinId('deadline', nextId);
          }
          setSyncStatus('ok');
          if (!silent) triggerToast('クラウド保管庫を構築・同期しました');
        } else {
          
          const res = await fetch(binUrl(targetBlobId), {
            headers: { 'X-Master-Key': jbKey },
            cache: 'no-store'
          });
          if (!res.ok) throw new Error('fetch failed: ' + res.status);
          const json = await res.json();
          const record = json.record || json;
          const rTasks = Array.isArray(record.tasks) ? record.tasks : [];
          const rDone = Array.isArray(record.doneTasks) ? record.doneTasks : [];

          
          const mergedTasksMap = {};
          [...rTasks, ...tasks].forEach(t => {
            mergedTasksMap[t.id] = { ...t, status: t.status || 'todo' };
          });
          const mergedTasks = Object.values(mergedTasksMap);

          const mergedDoneMap = {};
          [...rDone, ...doneTasks].forEach(t => {
            mergedDoneMap[t.id] = t;
          });
          const mergedDone = Object.values(mergedDoneMap);

          
          const doneIds = new Set(mergedDone.map(d => d.id));
          const finalTasks = mergedTasks.filter(t => !doneIds.has(t.id));

          setTasks(finalTasks);
          setDoneTasks(mergedDone);
          saveLocal(finalTasks, mergedDone);

          
          const p = await fetch(binPut(targetBlobId), {
            method: 'PUT',
            headers: {
              'X-Master-Key': jbKey,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ tasks: finalTasks, doneTasks: mergedDone })
          });
          if (!p.ok) throw new Error('push failed: ' + p.status);
          setSyncStatus('ok');
          if (!silent) triggerToast('クラウド同期を完了しました');
        }
      } catch (err) {
        setSyncStatus('error');
        if (!silent) triggerToast('同期失敗: ' + err.message);
      }
    };

    
    const pushBlob = async (nextTasks, nextDone) => {
      if (!blobId) return;
      try {
        const p = await fetch(binPut(blobId), {
          method: 'PUT',
          headers: {
            'X-Master-Key': getJbKey(),
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ tasks: nextTasks, doneTasks: nextDone })
        });
        if (p.ok) setSyncStatus('ok');
        else setSyncStatus('error');
      } catch (e) {
        setSyncStatus('error');
      }
    };

    
    const handleAdd = (e) => {
      e.preventDefault();
      if (!newTitle.trim()) return;

      const newTask = {
        id: Date.now(),
        title: newTitle.trim(),
        subject: newSubject.trim() || 'その他',
        priority: newPriority,
        date: newDate || new Date().toISOString().split('T')[0],
        period: newPeriod,
        memo: newMemo.trim(),
        status: 'todo'
      };

      const nextTasks = [...tasks, newTask];
      setTasks(nextTasks);
      saveLocal(nextTasks, doneTasks);
      pushBlob(nextTasks, doneTasks);

      
      setNewTitle('');
      setNewSubject('');
      setNewPriority('mid');
      setNewDate('');
      setNewPeriod('end');
      setNewMemo('');
      setShowAddModal(false);
      triggerToast('課題を登録しました');
    };

    const handleUpdateStatus = (id, newStatus) => {
      let nextTasks = [...tasks];
      let nextDone = [...doneTasks];

      if (newStatus === 'done') {
        
        const target = tasks.find(t => t.id === id);
        if (target) {
          nextTasks = tasks.filter(t => t.id !== id);
          nextDone = [...doneTasks, { ...target, doneAt: Date.now() }];
        }
        triggerToast('課題を完了しました！🎉');
      } else {
        
        const doneTarget = doneTasks.find(t => t.id === id);
        if (doneTarget) {
          nextDone = doneTasks.filter(t => t.id !== id);
          nextTasks = [...tasks, { ...doneTarget, status: newStatus }];
          triggerToast('課題を元に戻しました');
        } else {
          
          nextTasks = tasks.map(t => t.id === id ? { ...t, status: newStatus } : t);
        }
      }

      setTasks(nextTasks);
      setDoneTasks(nextDone);
      saveLocal(nextTasks, nextDone);
      pushBlob(nextTasks, nextDone);
    };

    const handleDelete = (id, isDone) => {
      if (!confirm('この課題データを削除しますか？')) return;
      let nextTasks = tasks;
      let nextDone = doneTasks;

      if (isDone) {
        nextDone = doneTasks.filter(t => t.id !== id);
      } else {
        nextTasks = tasks.filter(t => t.id !== id);
      }

      setTasks(nextTasks);
      setDoneTasks(nextDone);
      saveLocal(nextTasks, nextDone);
      pushBlob(nextTasks, nextDone);
      triggerToast('課題を削除しました');
    };

    const handleApplySettings = async (nextBlobId) => {
      const cleaned = nextBlobId.trim();
      if (cleaned !== (blobId || '')) {
        const nextId = cleaned || null;
        setBlobId(nextId);
        if (nextId) {
          localStorage.setItem(BLOB_KEY, nextId);
        } else {
          localStorage.removeItem(BLOB_KEY);
        }
        if (window.PWAConfigSync) {
          await window.PWAConfigSync.syncAppBinId('deadline', nextId);
        }
        setShowConfig(false);
        triggerToast('システム設定を適用しました');
        if (nextId) {
          setTimeout(() => syncCloud(false, nextId), 100);
        }
      } else {
        setShowConfig(false);
      }
    };

    const handleClearAll = () => {
      if (!confirm('本当にすべての課題データを削除しますか？この操作は取り消せません。')) return;
      setTasks([]);
      setDoneTasks([]);
      saveLocal([], []);
      pushBlob([], []);
      setShowConfig(false);
      triggerToast('全データを削除しました');
    };

    const handleExport = () => {
      const blob = new Blob([JSON.stringify({ tasks, doneTasks }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `deadline_survival_${Date.now()}.json`;
      a.click();
      triggerToast('バックアップをエクスポートしました');
    };

    const handleImport = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const parsed = JSON.parse(evt.target.result);
          const rTasks = Array.isArray(parsed.tasks) ? parsed.tasks : [];
          const rDone = Array.isArray(parsed.doneTasks) ? parsed.doneTasks : [];
          
          const mergedTasksMap = {};
          [...rTasks, ...tasks].forEach(t => {
            mergedTasksMap[t.id] = { ...t, status: t.status || 'todo' };
          });
          const finalTasks = Object.values(mergedTasksMap);

          const mergedDoneMap = {};
          [...rDone, ...doneTasks].forEach(t => {
            mergedDoneMap[t.id] = t;
          });
          const finalDone = Object.values(mergedDoneMap);

          setTasks(finalTasks);
          setDoneTasks(finalDone);
          saveLocal(finalTasks, finalDone);
          pushBlob(finalTasks, finalDone);
          triggerToast('バックアップをインポートしました');
        } catch(err) {
          triggerToast('データのインポートに失敗しました');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    };

    
    const getCountdown = (dateStr, periodStr) => {
      const timeStr = PERIOD_TIMES[periodStr] || "23:59";
      const targetTime = new Date(`${dateStr}T${timeStr}:00`).getTime();
      const nowTime = Date.now();
      const diff = targetTime - nowTime;

      if (diff <= 0) return { label: '期限切', status: 'status-over', critical: false };

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

      if (days > 3) {
        return { label: `残り ${days}日`, status: 'status-safe', critical: false };
      } else if (days > 1) {
        return { label: `残り ${days}日`, status: 'status-warn', critical: false };
      } else if (days === 1) {
        return { label: `残り 1日 ${hours}h`, status: 'status-danger', critical: false };
      } else {
        return { label: `残り ${hours}h ${minutes}m`, status: 'status-critical', critical: true };
      }
    };

    
    const filteredTasks = useMemo(() => {
      
      let result = [...tasks];
      if (searchQuery.trim()) {
        const query = searchQuery.toLowerCase();
        result = result.filter(t => 
          t.title.toLowerCase().includes(query) || 
          t.subject.toLowerCase().includes(query) || 
          (t.memo && t.memo.toLowerCase().includes(query))
        );
      }

      
      if (filterType === 'danger') {
        result = result.filter(t => {
          const cd = getCountdown(t.date, t.period);
          return cd.status === 'status-critical' || cd.status === 'status-danger';
        });
      }

      
      result.sort((a, b) => {
        if (sortBy === 'due') {
          const tA = new Date(`${a.date}T${PERIOD_TIMES[a.period] || "23:59"}:00`).getTime();
          const tB = new Date(`${b.date}T${PERIOD_TIMES[b.period] || "23:59"}:00`).getTime();
          return tA - tB;
        } else {
          return PRIORITY_ORDER[a.priority] - PRIORITY_ORDER[b.priority];
        }
      });

      return result;
    }, [tasks, searchQuery, filterType, sortBy, ticker]);

    const activeDoneTasks = useMemo(() => {
      let result = [...doneTasks];
      if (searchQuery.trim()) {
        const query = searchQuery.toLowerCase();
        result = result.filter(t => 
          t.title.toLowerCase().includes(query) || 
          t.subject.toLowerCase().includes(query)
        );
      }
      
      result.sort((a, b) => b.doneAt - a.doneAt);
      return result;
    }, [doneTasks, searchQuery]);

    
    const stats = useMemo(() => {
      const activeCount = tasks.length;
      const doneCount = doneTasks.length;
      const dangerCount = tasks.filter(t => {
        const cd = getCountdown(t.date, t.period);
        return cd.status === 'status-critical' || cd.status === 'status-danger';
      }).length;
      return { activeCount, doneCount, dangerCount };
    }, [tasks, doneTasks, ticker]);

    return h`
      <div class="dm-container">
        \x3C!-- Header -->
        <header class="dm-header">
          <div>
            <h1 class="dm-hud-title">_DEADLINE_SURVIVAL</h1>
            <div class="dm-hud-desc">> HUD: ACTIVE // 課題締切サバイバル</div>
          </div>
          <div class="dm-header-actions">
            <button class="dm-btn" onClick=${() => window.history.back()}>◀ EXIT</button>
            <span class=${`dm-sync-status ${syncStatus === 'ok' ? 'ok' : syncStatus === 'busy' ? 'busy' : syncStatus === 'error' ? 'error' : 'local'}`} onClick=${() => syncCloud()}>
              ${syncStatus === 'ok' ? '● SYNCED' : syncStatus === 'busy' ? '◌ SYNCING...' : syncStatus === 'error' ? '✕ ERROR' : '◌ LOCAL'}
            </span>
            <button class="dm-btn dm-btn-icon" onClick=${() => syncCloud()} title="今すぐ同期">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            </button>
            <button class="dm-btn dm-btn-icon" onClick=${() => setShowConfig(true)} title="設定">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </header>

        \x3C!-- Stats Bar (Tabs Filter) -->
        <section class="dm-stats-bar">
          <div class=${`dm-stat-tab ${filterType === 'all' ? 'active' : ''}`} onClick=${() => setFilterType('all')}>
            <div class="dm-stat-num">${stats.activeCount + stats.doneCount}</div>
            <div class="dm-stat-label">総課題数</div>
          </div>
          <div class=${`dm-stat-tab ${filterType === 'active' ? 'active' : ''}`} onClick=${() => setFilterType('active')}>
            <div class="dm-stat-num c-active">${stats.activeCount}</div>
            <div class="dm-stat-label">未完了</div>
          </div>
          <div class=${`dm-stat-tab ${filterType === 'danger' ? 'active' : ''}`} onClick=${() => setFilterType('danger')}>
            <div class="dm-stat-num c-danger">${stats.dangerCount}</div>
            <div class="dm-stat-label">期限間近</div>
          </div>
          <div class=${`dm-stat-tab ${filterType === 'done' ? 'active' : ''}`} onClick=${() => setFilterType('done')}>
            <div class="dm-stat-num c-done">${stats.doneCount}</div>
            <div class="dm-stat-label">完了済</div>
          </div>
        </section>

        \x3C!-- Toolbar -->
        <section class="dm-toolbar">
          <div class="dm-search-wrap">
            <span class="dm-search-icon">🔍</span>
            <input type="text" placeholder="科目・課題を検索..." class="dm-search" value=${searchQuery} onChange=${e => setSearchQuery(e.target.value)} />
          </div>

          <div style=${ { display: 'flex', gap: '0.5rem', alignItems: 'center' } }>
            <select class="dm-sort-sel" value=${sortBy} onChange=${e => setSortBy(e.target.value)}>
              <option value="due">⏰ 締切が近い順</option>
              <option value="priority">⚠️ 優先度が高い順</option>
            </select>

            <div class="dm-view-toggle">
              <div class=${`dm-view-btn ${viewMode === 'kanban' ? 'active' : ''}`} onClick=${() => setViewMode('kanban')}>
                <span>🗂️ カンバン</span>
              </div>
              <div class=${`dm-view-btn ${viewMode === 'list' ? 'active' : ''}`} onClick=${() => setViewMode('list')}>
                <span>📋 リスト</span>
              </div>
            </div>

            <button class="dm-btn dm-btn-primary" onClick=${() => setShowAddModal(true)} style=${ { height: '2.15rem' } }>+ ADD</button>
          </div>
        </section>

        \x3C!-- Main Workspace -->
        ${filterType === 'done' ? (
          
          h`
            <div class="dm-list-wrap">
              ${activeDoneTasks.length === 0 ? (
                h`<div class="dm-empty">完了した課題はありません</div>`
              ) : activeDoneTasks.map(task => h`
                <div key=${task.id} class="dm-card dm-list-item status-over">
                  <div>
                    <div class="dm-task-title" style=${ { textDecoration: 'line-through' } }>${task.title}</div>
                    <div class="dm-task-meta" style=${ { marginTop: '0.2rem' } }>
                      <span class="dm-badge">${task.subject}</span>
                      <span class="dm-badge">${PRIORITY_LABEL[task.priority]}</span>
                    </div>
                  </div>
                  <div>-</div>
                  <div style=${ { fontSize: '0.7rem', color: '#4b5563' } }>
                    完了日: ${new Date(task.doneAt).toLocaleDateString()}
                  </div>
                  <div class="dm-actions-group">
                    <button class="dm-action-icon-btn check" onClick=${() => handleUpdateStatus(task.id, 'todo')} title="未完了に戻す">↺</button>
                    <button class="dm-action-icon-btn del" onClick=${() => handleDelete(task.id, true)} title="消去">×</button>
                  </div>
                </div>
              `)}
            </div>
          `
        ) : viewMode === 'kanban' ? (
          
          h`
            <div class="dm-kanban-grid">
              \x3C!-- Column Todo -->
              <div class="dm-kanban-col">
                <div class="dm-kanban-header">
                  <span>To Do</span>
                  <span>${filteredTasks.filter(t => t.status === 'todo').length}</span>
                </div>
                ${filteredTasks.filter(t => t.status === 'todo').map(task => renderTaskCard(task))}
              </div>

              \x3C!-- Column In Progress -->
              <div class="dm-kanban-col">
                <div class="dm-kanban-header">
                  <span>In Progress</span>
                  <span>${filteredTasks.filter(t => t.status === 'inprogress').length}</span>
                </div>
                ${filteredTasks.filter(t => t.status === 'inprogress').map(task => renderTaskCard(task))}
              </div>

              \x3C!-- Column Completed (Compact logs) -->
              <div class="dm-kanban-col">
                <div class="dm-kanban-header">
                  <span>Completed</span>
                  <span>${activeDoneTasks.length}</span>
                </div>
                ${activeDoneTasks.slice(0, 10).map(task => h`
                  <div key=${task.id} class="dm-card" style=${ { padding: '0.75rem', opacity: 0.6 } }>
                    <div style=${ { fontSize: '0.8rem', fontWeight: 'bold', textDecoration: 'line-through' } }>${task.title}</div>
                    <div style=${ { display: 'flex', justifyContent: 'space-between', marginTop: '0.4rem', fontSize: '0.6rem', color: '#64748b' } }>
                      <span>${task.subject}</span>
                      <button style=${ { background: 'none', border: 'none', color: '#10b981', cursor: 'pointer' } } onClick=${() => handleUpdateStatus(task.id, 'todo')}>↺</button>
                    </div>
                  </div>
                `)}
                ${activeDoneTasks.length > 10 && h`<div style=${ { textAlign: 'center', fontSize: '0.65rem', color: '#4b5563' } }>+ 他 ${activeDoneTasks.length - 10}件の完了課題</div>`}
              </div>
            </div>
          `
        ) : (
          
          h`
            <div class="dm-list-wrap">
              ${filteredTasks.length === 0 ? (
                h`<div class="dm-empty">該当する課題はありません</div>`
              ) : filteredTasks.map(task => {
                const countdown = getCountdown(task.date, task.period);
                return h`
                  <div key=${task.id} class=${`dm-card dm-list-item ${countdown.status}`}>
                    <div>
                      <div class="dm-task-title">${task.title}</div>
                      <div class="dm-task-meta" style=${ { marginTop: '0.2rem' } }>
                        <span class="dm-badge">${task.subject}</span>
                        <span class=${`dm-badge p-${task.priority}`}>${PRIORITY_LABEL[task.priority]}</span>
                        ${task.memo && h`<span style=${ { fontSize: '0.65rem', color: '#4b5563' } }>${task.memo}</span>`}
                      </div>
                    </div>
                    <div>
                      <span class="dm-countdown-text">${countdown.label}</span>
                    </div>
                    <div style=${ { fontSize: '0.7rem', color: '#64748b' } }>
                      ${task.date} (${task.period}限)
                    </div>
                    <div class="dm-actions-group">
                      ${task.status === 'todo' ? (
                        h`<button class="dm-action-icon-btn" onClick=${() => handleUpdateStatus(task.id, 'inprogress')} title="進行中に移動">▶</button>`
                      ) : (
                        h`<button class="dm-action-icon-btn" onClick=${() => handleUpdateStatus(task.id, 'todo')} title="ToDoに移動">◀</button>`
                      )}
                      <button class="dm-action-icon-btn check" onClick=${() => handleUpdateStatus(task.id, 'done')} title="完了">✓</button>
                      <button class="dm-action-icon-btn del" onClick=${() => handleDelete(task.id, false)} title="消去">×</button>
                    </div>
                  </div>
                `;
              })}
            </div>
          `
        )}

        \x3C!-- System usage guide -->
        <section class="dm-card" style=${ { fontSize: '0.8rem', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem', flexWrap: 'wrap' } }>
          <div>
            <h4 style=${ { fontFamily: 'Orbitron', color: '#d946ef', marginBottom: '0.5rem' } }>[SURVIVAL_MANUAL]</h4>
            <div style=${ { color: '#a1a1aa', lineHeight: '1.6' } }>
              課題の締切は時限ごとの終了時刻に基づいて判定され、リアルタイムにカウントダウンされます。
              カンバンのドラッグや矢印操作で、ToDoから進行中、完了へと直感的に移行できます。
            </div>
          </div>
          <div>
            <h4 style=${ { fontFamily: 'Orbitron', color: '#06b6d4', marginBottom: '0.5rem' } }>[SECURE_SYNC]</h4>
            <div style=${ { color: '#a1a1aa', lineHeight: '1.6', fontSize: '0.75rem' } }>
              PWA一括同期に対応しています。設定で割り振られた一意の同期IDを用いることで、複数デバイス間で課題の締切リストを即時同期・バックアップ可能です。
            </div>
          </div>
        </section>

        \x3C!-- Add Task Modal -->
        <div class=${`dm-overlay ${showAddModal ? 'show' : ''}`} onClick=${(e) => e.target.classList.contains('dm-overlay') && setShowAddModal(false)}>
          <div class="dm-modal">
            <div class="dm-modal-header">
              <span style=${ { fontFamily: 'Orbitron', fontWeight: 'bold', color: '#d946ef' } }>📝 REGISTER_NEW_TASK</span>
              <button style=${ { background: 'none', border: 'none', color: '#71717a', cursor: 'pointer', fontSize: '1.2rem' } } onClick=${() => setShowAddModal(false)}>×</button>
            </div>
            
            <form onSubmit=${handleAdd} class="ag-form-layout">
              <div class="dm-form-field">
                <label>課題タイトル</label>
                <input type="text" placeholder="例: レポート第1回" class="dm-input" value=${newTitle} onChange=${e => setNewTitle(e.target.value)} required />
              </div>
              <div class="dm-form-field">
                <label>科目名</label>
                <input type="text" placeholder="例: 電磁気学 (デフォルト: その他)" class="dm-input" value=${newSubject} onChange=${e => setNewSubject(e.target.value)} />
              </div>
              <div class="dm-form-field">
                <label>優先度</label>
                <select class="dm-select" value=${newPriority} onChange=${e => setNewPriority(e.target.value)}>
                  <option value="high">▲ 高 (至急)</option>
                  <option value="mid">⬡ 普通</option>
                  <option value="low">▽ 低 (いつでも)</option>
                </select>
              </div>
              <div class="dm-form-field">
                <label>締切日</label>
                <input type="date" class="dm-input" value=${newDate} onChange=${e => setNewDate(e.target.value)} required />
              </div>
              <div class="dm-form-field">
                <label>締切時限</label>
                <select class="dm-select" value=${newPeriod} onChange=${e => setNewPeriod(e.target.value)}>
                  <option value="1">1限終 (10:20)</option>
                  <option value="2">2限終 (12:00)</option>
                  <option value="3">3限終 (14:30)</option>
                  <option value="4">4限終 (16:10)</option>
                  <option value="5">5限終 (17:50)</option>
                  <option value="end">終日 (23:59)</option>
                </select>
              </div>
              <div class="dm-form-field">
                <label>メモ</label>
                <input type="text" placeholder="提出方法や範囲など" class="dm-input" value=${newMemo} onChange=${e => setNewMemo(e.target.value)} />
              </div>

              <div class="dm-modal-footer">
                <button type="button" class="dm-btn" onClick=${() => setShowAddModal(false)}>キャンセル</button>
                <button type="submit" class="dm-btn dm-btn-primary">追加</button>
              </div>
            </form>
          </div>
        </div>

        \x3C!-- Settings Modal Overlay -->
        <div class=${`dm-overlay ${showConfig ? 'show' : ''}`} onClick=${(e) => e.target.classList.contains('dm-overlay') && setShowConfig(false)}>
          <div class="dm-modal">
            <div class="dm-modal-header">
              <span style=${ { fontFamily: 'Orbitron', fontWeight: 'bold' } }>⚙️ SYSTEM CONFIGURATION</span>
              <button style=${ { background: 'none', border: 'none', color: '#71717a', cursor: 'pointer', fontSize: '1.2rem' } } onClick=${() => setShowConfig(false)}>×</button>
            </div>
            
            <div style=${ { display: 'flex', flexDirection: 'column', gap: '1.25rem' } }>
              <div>
                <label style=${ { fontSize: '0.7rem', color: '#71717a', textTransform: 'uppercase', display: 'block', marginBottom: '0.35rem' } }>Current Connection Sync ID</label>
                <div class="ag-blob-display">${blobId || '（未同期／ローカル保存のみ）'}</div>
              </div>
              
              <div>
                <label style=${ { fontSize: '0.7rem', color: '#71717a', textTransform: 'uppercase', display: 'block', marginBottom: '0.35rem' } }>Apply Existing Sync ID</label>
                <input type="text" id="dm-blob-input" class="dm-input" placeholder="接続IDを入力してロード" defaultValue=${blobId || ''} />
              </div>

              <div style=${ { borderTop: '1px solid hsl(var(--border))', paddingTop: '1rem' } }>
                <span style=${ { fontSize: '0.7rem', color: '#71717a', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' } }>Data Backup & Purge</span>
                <div style=${ { display: 'flex', gap: '0.5rem', flexWrap: 'wrap' } }>
                  <button class="dm-btn" onClick=${handleExport}>📤 エクスポート</button>
                  <label class="dm-btn" style=${ { cursor: 'pointer' } }>
                    📥 インポート
                    <input type="file" accept=".json" style=${ { display: 'none' } } onChange=${handleImport} />
                  </label>
                  <button class="dm-btn dm-btn-primary" style=${ { background: 'rgba(239,68,68,0.1)', color: '#ef4444', border: '1px solid rgba(239,68,68,0.2)' } } onClick=${handleClearAll}>🗑️ 全データ削除</button>
                </div>
              </div>
            </div>

            <div class="dm-modal-footer">
              <button class="dm-btn" onClick=${() => setShowConfig(false)}>キャンセル</button>
              <button class="dm-btn dm-btn-primary" onClick=${() => {
                const val = document.getElementById('dm-blob-input').value;
                handleApplySettings(val);
              }}>適用</button>
            </div>
          </div>
        </div>

        \x3C!-- Toast Notification -->
        <div class=${`dm-toast ${toastShow ? 'show' : ''}`}>
          ${toastMsg}
        </div>
      </div>
    `;

    
    function renderTaskCard(task) {
      const countdown = getCountdown(task.date, task.period);
      
      return h`
        <div key=${task.id} class=${`dm-card dm-task-card ${countdown.status}`}>
          <div class="dm-info">
            <div class="dm-task-header">
              <span class="dm-task-title" title=${task.title}>${task.title}</span>
            </div>
            <div class="dm-task-meta">
              <span class="dm-badge">${task.subject}</span>
              <span class=${`dm-badge p-${task.priority}`}>${PRIORITY_LABEL[task.priority]}</span>
            </div>
            ${task.memo && h`<div class="dm-task-note">${task.memo}</div>`}
          </div>

          <div class="dm-task-actions">
            <div>
              <span class="dm-time-label">Deadline</span>
              <span class="dm-countdown-text">${countdown.label}</span>
            </div>

            <div class="dm-actions-group">
              ${task.status === 'todo' && h`
                <button class="dm-action-icon-btn" onClick=${() => handleUpdateStatus(task.id, 'inprogress')} title="進行中へ">➔</button>
              `}
              ${task.status === 'inprogress' && h`
                <button class="dm-action-icon-btn" onClick=${() => handleUpdateStatus(task.id, 'todo')} title="ToDoへ">左</button>
              `}
              <button class="dm-action-icon-btn check" onClick=${() => handleUpdateStatus(task.id, 'done')} title="完了">✓</button>
              <button class="dm-action-icon-btn del" onClick=${() => handleDelete(task.id, false)} title="消去">×</button>
            </div>
          </div>
        </div>
      `;
    }
  }

  ReactDOM.createRoot(document.getElementById('dm-root')).render(h`<${App} />`);
})();
</script>
