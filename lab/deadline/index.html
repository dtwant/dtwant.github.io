      <div>
        <label style="font-size: 0.75rem; color: var(--apple-subtext); display: block; margin-bottom: 0.4rem; text-align: left;">接続 BIN ID</label>
        <div id="dm-config-blob-id" style="padding: 0.85rem; border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid var(--apple-border); font-family: monospace; font-size: 0.85rem;">未接続 (LOCAL)</div>
      </div>
      <button class="dm-btn" style="width: 100%;" onclick="dmCloseConfigModal()">閉じる</button>
    </div>
  </div>
</div>

<div id="dm-toast" class="dm-toast"></div>

<script>
(function() {
  const STORAGE_KEY = 'dt_deadline_v5';
  const DONE_KEY = 'dt_deadline_done_v5';
  const BLOB_KEY = 'dt_deadline_blob_id';

  const PERIOD_TIMES = {
    1: "08:50",
    2: "10:30",
    3: "13:00",
    4: "14:40",
    5: "16:20",
    "end": "23:59"
  };

  let tasks = [];
  let doneTasks = [];
  let blobId = localStorage.getItem(BLOB_KEY) || null;
  let syncStatus = blobId ? 'ok' : 'local';
  let activeTab = 'all'; 
  let toastTimer = null;

  function showToast(msg) {
    const el = document.getElementById('dm-toast');
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
  }

  function getJbKey() {
    return (window.PWAConfigSync ? window.PWAConfigSync.getApiKey() : '$2a$10$C0Z.Fl3F.BCvUaC5rHVt3OD6aYt8SXRkmXExr3mfmtCrGdDzG8Aae');
  }

  function loadLocalData() {
    try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { tasks = []; }
    try { doneTasks = JSON.parse(localStorage.getItem(DONE_KEY)) || []; } catch(e) { doneTasks = []; }

    if (tasks.length === 0 && doneTasks.length === 0 && !localStorage.getItem(STORAGE_KEY)) {
      const tomorrow = new Date(Date.now() + 86400000).toISOString().split('T')[0];
      tasks = [
        { id: 1, title: 'サンプル: 物理学レポート', course: '物理学', priority: 'high', date: tomorrow, period: 'end' }
      ];
    }
  }

  function saveAndSync() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      localStorage.setItem(DONE_KEY, JSON.stringify(doneTasks));
    } catch(e) {}
    renderApp();

    if (!blobId) return;
    fetch('https://api.jsonbin.io/v3/b/' + blobId, {
      method: 'PUT',
      headers: { 'X-Master-Key': getJbKey(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ tasks, doneTasks })
    }).then(res => {
      syncStatus = res.ok ? 'ok' : 'error';
      renderApp();
    }).catch(() => {
      syncStatus = 'error';
      renderApp();
    });
  }

  function calculateCountdown(dateStr, periodStr) {
    if (!dateStr) return { text: '期限未設定', diffMs: 999999999, state: 'safe' };
    const timeStr = PERIOD_TIMES[periodStr] || "23:59";
    const target = new Date(`${dateStr}T${timeStr}:00`).getTime();
    const now = Date.now();
    const diff = target - now;

    if (diff <= 0) return { text: '期限切れ', diffMs: diff, state: 'danger' };

    const hours = Math.floor(diff / (1000 * 60 * 60));
    const days = Math.floor(hours / 24);

    let state = 'safe';
    if (hours <= 24) state = 'danger';
    else if (hours <= 72) state = 'warn';

    if (days >= 1) return { text: `残り ${days}日`, diffMs: diff, state };
    return { text: `残り ${hours}時間`, diffMs: diff, state };
  }

  function renderApp() {
    const container = document.getElementById('dm-main-content');
    if (!container) return;

    let displayTasks = [];
    if (activeTab === 'all') displayTasks = tasks;
    else if (activeTab === 'urgent') displayTasks = tasks.filter(t => calculateCountdown(t.date, t.period).state === 'danger');
    else if (activeTab === 'done') displayTasks = doneTasks;

    if (activeTab !== 'done') {
      displayTasks.sort((a, b) => calculateCountdown(a.date, a.period).diffMs - calculateCountdown(b.date, b.period).diffMs);
    }

    const urgentCount = tasks.filter(t => calculateCountdown(t.date, t.period).state === 'danger').length;

    let listHtml = '';
    if (displayTasks.length === 0) {
      listHtml = `<div style="text-align:center;padding:3.5rem 1rem;color:var(--apple-subtext);font-size:0.9rem;">タスクはありません</div>`;
    } else {
      listHtml = displayTasks.map(task => {
        const isDone = activeTab === 'done';
        const cd = isDone ? { text: '完了', state: 'safe' } : calculateCountdown(task.date, task.period);

        return `
          <div class="dm-task-card ${cd.state}" onclick="dmOpenEditModal('${task.id}', ${isDone})">
            <div class="dm-check-circle ${isDone ? 'checked' : ''}" onclick="event.stopPropagation(); dmToggleTask('${task.id}', ${isDone})">
              ${isDone ? '✓' : ''}
            </div>
            <div class="dm-task-title-text ${isDone ? 'done' : ''}">${task.title}</div>
            <div class="dm-task-submeta">
              ${task.course ? `<span>${task.course}</span>` : ''}
              <span>${task.date || ''} (${PERIOD_TIMES[task.period] || '23:59'})</span>
            </div>
            ${!isDone ? `<div class="dm-badge-tag ${cd.state}">${cd.text}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    container.innerHTML = `
      <div class="dm-header">
        <h1 class="dm-title">Deadline Manager</h1>
        <div class="dm-subtitle">Task & Schedule Tracker</div>
        <div style="display: flex; gap: 0.5rem; align-items: center; margin-top: 0.4rem;">
          <span class="dm-pill ${syncStatus}" onclick="showToast('同期状態: ' + syncStatus)">
            ${syncStatus === 'ok' ? '● SYNCED' : syncStatus === 'busy' ? '◌ SYNCING' : '◌ LOCAL'}
          </span>
          <button class="dm-btn dm-btn-circle" onclick="dmOpenConfigModal()" title="設定">⚙</button>
        </div>
      </div>

      \x3C!-- Chic Center Metric Cards with Neon Accent -->
      <div class="dm-widget-grid">
        <div class="dm-widget-card urgent" onclick="dmSwitchTab('urgent')">
          <div class="dm-widget-val" style="color:var(--neon-pink); text-shadow:0 0 15px var(--neon-pink-glow);">${urgentCount}</div>
          <div class="dm-widget-label">緊急 (24h以内)</div>
        </div>
        <div class="dm-widget-card all" onclick="dmSwitchTab('all')">
          <div class="dm-widget-val" style="color:var(--neon-cyan); text-shadow:0 0 15px var(--neon-cyan-glow);">${tasks.length}</div>
          <div class="dm-widget-label">未完了タスク</div>
        </div>
        <div class="dm-widget-card done" onclick="dmSwitchTab('done')">
          <div class="dm-widget-val" style="color:var(--neon-green); text-shadow:0 0 15px var(--neon-green-glow);">${doneTasks.length}</div>
          <div class="dm-widget-label">完了済み</div>
        </div>
      </div>

      \x3C!-- Chic Segment Control -->
      <div class="dm-segmented-control">
        <div class="dm-segment-btn ${activeTab === 'all' ? 'active' : ''}" onclick="dmSwitchTab('all')">全件</div>
        <div class="dm-segment-btn ${activeTab === 'urgent' ? 'active' : ''}" onclick="dmSwitchTab('urgent')">緊急 (${urgentCount})</div>
        <div class="dm-segment-btn ${activeTab === 'done' ? 'active' : ''}" onclick="dmSwitchTab('done')">完了 (${doneTasks.length})</div>
      </div>

      \x3C!-- Task Cards List -->
      <div style="display: flex; flex-direction: column; gap: 0.85rem;">
        ${listHtml}
      </div>
    `;
  }

  
  window.dmSwitchTab = function(tab) {
    activeTab = tab;
    renderApp();
  };

  window.dmToggleTask = function(id, isDone) {
    if (isDone) {
      const idx = doneTasks.findIndex(t => String(t.id) === String(id));
      if (idx !== -1) {
        const item = doneTasks.splice(idx, 1)[0];
        tasks.push(item);
        showToast('タスクを未完了に戻しました');
      }
    } else {
      const idx = tasks.findIndex(t => String(t.id) === String(id));
      if (idx !== -1) {
        const item = tasks.splice(idx, 1)[0];
        doneTasks.push(item);
        showToast('タスクを完了しました');
      }
    }
    saveAndSync();
  };

  window.dmOpenAddModal = function() {
    document.getElementById('dm-modal-title').textContent = '新規タスク';
    document.getElementById('dm-edit-id').value = '';
    document.getElementById('dm-input-title').value = '';
    document.getElementById('dm-input-course').value = '';
    document.getElementById('dm-input-priority').value = 'mid';
    document.getElementById('dm-input-date').value = new Date(Date.now() + 86400000).toISOString().split('T')[0];
    document.getElementById('dm-input-period').value = 'end';
    document.getElementById('dm-del-btn').style.display = 'none';

    document.getElementById('dm-task-modal').classList.add('show');
  };

  window.dmOpenEditModal = function(id, isDone) {
    if (isDone) return;
    const target = tasks.find(t => String(t.id) === String(id));
    if (!target) return;

    document.getElementById('dm-modal-title').textContent = 'タスクの編集';
    document.getElementById('dm-edit-id').value = target.id;
    document.getElementById('dm-input-title').value = target.title;
    document.getElementById('dm-input-course').value = target.course || '';
    document.getElementById('dm-input-priority').value = target.priority || 'mid';
    document.getElementById('dm-input-date').value = target.date || '';
    document.getElementById('dm-input-period').value = target.period || 'end';
    document.getElementById('dm-del-btn').style.display = 'inline-flex';

    document.getElementById('dm-task-modal').classList.add('show');
  };

  window.dmCloseTaskModal = function() {
    document.getElementById('dm-task-modal').classList.remove('show');
  };

  window.dmTaskSubmit = function(e) {
    e.preventDefault();
    const editId = document.getElementById('dm-edit-id').value;
    const title = document.getElementById('dm-input-title').value.trim();
    const course = document.getElementById('dm-input-course').value.trim();
    const priority = document.getElementById('dm-input-priority').value;
    const date = document.getElementById('dm-input-date').value;
    const period = document.getElementById('dm-input-period').value;

    if (!title) return;

    if (editId) {
      tasks = tasks.map(t => String(t.id) === String(editId) ? { ...t, title, course, priority, date, period } : t);
      showToast('タスクを更新しました');
    } else {
      tasks.push({ id: Date.now(), title, course, priority, date, period });
      showToast('新規タスクを追加しました');
    }

    saveAndSync();
    dmCloseTaskModal();
  };

  window.dmDeleteCurrentTask = function() {
    const editId = document.getElementById('dm-edit-id').value;
    if (!editId) return;
    if (!confirm('このタスクを削除しますか？')) return;
    tasks = tasks.filter(t => String(t.id) !== String(editId));
    saveAndSync();
    dmCloseTaskModal();
    showToast('タスクを削除しました');
  };

  window.dmOpenConfigModal = function() {
    document.getElementById('dm-config-blob-id').textContent = blobId || '未接続 (LOCAL)';
    document.getElementById('dm-config-modal').classList.add('show');
  };
  window.dmCloseConfigModal = function() {
    document.getElementById('dm-config-modal').classList.remove('show');
  };

  
  document.addEventListener('DOMContentLoaded', () => {
    loadLocalData();
    renderApp();
  });
  loadLocalData();
  renderApp();
})();
</script>

    </main>
  </body>
</html>
