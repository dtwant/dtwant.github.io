    try { local = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch(e) { local = []; }
    if (local.length === 0 && !localStorage.getItem(STORAGE_KEY)) {
      local = [{ id: 1, name: 'サンプル: 物理学', type: 'half', credit: 2, customFail: -11, weeklyLessons: 1, current: 0, history: [] }];
    }

    let timetableCourses = [];
    try {
      const timetableData = JSON.parse(localStorage.getItem('dt_subject_progress_data')) || {};
      if (timetableData && typeof timetableData === 'object' && !Array.isArray(timetableData)) {
        timetableCourses = Object.keys(timetableData).map(subName => {
          const subjectData = timetableData[subName];
          let currentLoss = 0;
          let maxIndex = 15;

          if (subjectData && typeof subjectData === 'object' && !Array.isArray(subjectData)) {
            Object.keys(subjectData).forEach(idxKey => {
              const idx = parseInt(idxKey);
              if (isNaN(idx)) return;
              if (idx > 15) maxIndex = 30;
              const item = subjectData[idxKey];
              if (!item || typeof item !== 'object') return;

              if (item.status === 'delayed') currentLoss -= 1;
              else if (item.status === 'offline') currentLoss -= 2;
            });
          }

          const isFull = maxIndex > 15;
          return {
            id: 'tt-' + subName,
            name: subName,
            type: isFull ? 'full' : 'half',
            credit: 2,
            customFail: isFull ? -21 : -11,
            weeklyLessons: 1,
            current: currentLoss,
            history: [],
            isTimetableLinked: true
          };
        });
      }
    } catch (e) {}

    const merged = [...timetableCourses];
    local.forEach(lc => {
      if (!lc || typeof lc !== 'object') return;
      const matchedIndex = merged.findIndex(tc => tc.name === lc.name);
      if (matchedIndex !== -1) {
        merged[matchedIndex].credit = lc.credit || merged[matchedIndex].credit;
        merged[matchedIndex].type = lc.type || merged[matchedIndex].type;
        merged[matchedIndex].customFail = lc.customFail || merged[matchedIndex].customFail;
        merged[matchedIndex].weeklyLessons = lc.weeklyLessons || merged[matchedIndex].weeklyLessons;
        merged[matchedIndex].id = lc.id;
      } else if (!lc.isTimetableLinked) {
        merged.push({
          ...lc,
          customFail: lc.customFail || (lc.type === 'full' ? -21 : -11),
          weeklyLessons: lc.weeklyLessons || 1,
          history: Array.isArray(lc.history) ? lc.history : [],
          isTimetableLinked: false
        });
      }
    });
    return merged;
  }

  function saveAndSync(nextCourses) {
    courses = nextCourses;
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(nextCourses)); } catch(e) {}
    renderApp();

    if (!blobId) return;
    fetch('https://api.jsonbin.io/v3/b/' + blobId, {
      method: 'PUT',
      headers: { 'X-Master-Key': getJbKey(), 'Content-Type': 'application/json' },
      body: JSON.stringify({ courses: nextCourses })
    }).then(res => {
      syncStatus = res.ok ? 'ok' : 'error';
      renderApp();
    }).catch(() => {
      syncStatus = 'error';
      renderApp();
    });
  }

  function getFailBorder(course) {
    if (course.customFail && typeof course.customFail === 'number') {
      return course.customFail;
    }
    const defaultRule = RULES[course.type] || RULES.half;
    return defaultRule.fail;
  }

  function renderApp() {
    const container = document.getElementById('ag-main-content');
    if (!container) return;

    const totalCredits = courses.reduce((acc, c) => acc + (c && c.credit ? c.credit : 0), 0);
    const dangerCount = courses.filter(c => {
      const failVal = getFailBorder(c);
      const dangerVal = failVal + 2;
      return c.current <= dangerVal && c.current > failVal;
    }).length;
    const failCount = courses.filter(c => {
      const failVal = getFailBorder(c);
      return c.current <= failVal;
    }).length;

    let coursesHtml = courses.map(course => {
      const rule = RULES[course.type] || RULES.half;
      const failVal = getFailBorder(course);
      const limitVal = failVal + 1; 
      const isFailed = course.current <= failVal;
      const isDanger = course.current <= (failVal + 2) && !isFailed;
      const statusClass = isFailed ? 'danger' : isDanger ? 'warn' : 'safe';
      const remainingToFail = Math.max(0, course.current - failVal);
      const percent = Math.min((Math.abs(course.current) / Math.abs(limitVal)) * 100, 100);
      const ringColor = isFailed ? 'var(--apple-red)' : isDanger ? 'var(--apple-yellow)' : 'var(--apple-green)';
      const weekly = course.weeklyLessons || 1;

      const actionButtons = course.isTimetableLinked ? `
        <a href="/project-x/timetable/" class="ag-btn" style="width: 100%; text-decoration: none; color: #64d2ff; background: rgba(100,210,255,0.06);">
          時間割ログで出欠を記録 ➔
        </a>
      ` : `
        <div class="ag-actions">
          <button class="ag-act-btn" style="color:var(--apple-yellow);" onclick="agUpdateCourse('${course.id}', -1, 'late')" ${isFailed ? 'disabled' : ''}>
            遅刻 (-1)
          </button>
          <button class="ag-act-btn" style="color:var(--apple-red);" onclick="agUpdateCourse('${course.id}', -2, 'absent')" ${isFailed ? 'disabled' : ''}>
            欠席 (-2)
          </button>
          <button class="ag-act-btn" onclick="agUpdateCourse('${course.id}', 1, 'undo')">
            ＋1
          </button>
        </div>
      `;

      return `
        <div class="ag-card ag-course-card ${statusClass}">
          <div class="ag-course-header">
            <div>
              <div class="ag-course-name">${course.name}</div>
              <div class="ag-tags">
                <span class="ag-tag" onclick="agOpenEditModal('${course.id}')">${course.credit}単位</span>
                <span class="ag-tag" onclick="agOpenEditModal('${course.id}')">${rule.label}</span>
                <span class="ag-tag" onclick="agOpenEditModal('${course.id}')">${failVal}pt落単</span>
                <span class="ag-tag" onclick="agOpenEditModal('${course.id}')">週${weekly}コマ</span>
                <span class="ag-tag edit-trigger" onclick="agOpenEditModal('${course.id}')">✎ 設定</span>
              </div>
            </div>
            <div class="ag-ring-wrap" style="background: conic-gradient(${ringColor} ${percent}%, rgba(255,255,255,0.08) 0%)">
              <div class="ag-ring-inner">
                <span style="color: ${ringColor}">${course.current}</span>
              </div>
            </div>
          </div>

          <div style="display: flex; flex-direction: column; gap: 0.4rem;">
            <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--apple-subtext);">
              <span>${isFailed ? '落単確定' : `あと欠席 ${Math.floor(remainingToFail / 2)}回 (遅刻 ${remainingToFail}回)`}</span>
              <span style="font-weight: 600; color: ${ringColor}">${Math.round(percent)}% RISK</span>
            </div>
            <div class="ag-gauge-bar">
              <div class="ag-gauge-fill" style="width: ${percent}%"></div>
            </div>
          </div>

          ${actionButtons}
        </div>
      `;
    }).join('');

    container.innerHTML = `
      <div class="ag-header">
        <div>
          <h1 class="ag-title">出欠 Guardian</h1>
          <div class="ag-subtitle">Attendance & Risk Monitor</div>
        </div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <span class="ag-pill ${syncStatus}" onclick="agTriggerSync()">
            ${syncStatus === 'ok' ? '● SYNCED' : syncStatus === 'busy' ? '◌ SYNCING' : '◌ LOCAL'}
          </span>
          <button class="ag-btn ag-btn-circle" onclick="agOpenAddModal()" title="科目追加">＋</button>
          <button class="ag-btn ag-btn-circle" onclick="agOpenConfigModal()" title="設定">⚙</button>
          <button class="ag-btn" style="color:var(--apple-red); border-color:rgba(255,69,58,0.3); background:rgba(255,69,58,0.1);" onclick="if(history.length>1){history.back();}else{location.href='/lab/';}" title="ポータルへ戻る">✕ EXIT</button>
        </div>
      </div>

      <div class="ag-stats-row">
        <div class="ag-stat-card">
          <div class="ag-stat-label">登録単位数</div>
          <div class="ag-stat-val">${totalCredits}<span style="font-size: 0.9rem; color: var(--apple-subtext); margin-left: 0.3rem;">単位</span></div>
        </div>
        <div class="ag-stat-card">
          <div class="ag-stat-label">警告 / 落単リスク</div>
          <div class="ag-stat-val">
            <span style="color: ${dangerCount > 0 ? 'var(--apple-yellow)' : 'var(--apple-text)'}">${dangerCount}</span>
            <span style="color: var(--apple-subtext); margin: 0 0.4rem; font-size: 1.2rem;">/</span>
            <span style="color: ${failCount > 0 ? 'var(--apple-red)' : 'var(--apple-text)'}">${failCount}</span>
          </div>
        </div>
      </div>

      <div style="display: flex; flex-direction: column; gap: 1rem;">
        ${coursesHtml}
      </div>
    `;
  }

  
  window.agUpdateCourse = function(id, delta, actionType) {
    const next = courses.map(c => {
      if (c.id === id && !c.isTimetableLinked) {
        return { ...c, current: Math.min(0, c.current + delta) };
      }
      return c;
    });
    saveAndSync(next);
    showToast(actionType === 'undo' ? '数値を修正しました' : (actionType === 'late' ? '遅刻を記録しました' : '欠席を記録しました'));
  };

  window.agOpenAddModal = function() {
    document.getElementById('ag-add-modal').classList.add('show');
  };
  window.agCloseAddModal = function() {
    document.getElementById('ag-add-modal').classList.remove('show');
  };
  window.agAddCourseSubmit = function(e) {
    e.preventDefault();
    const name = document.getElementById('ag-input-name').value.trim();
    const credit = Number(document.getElementById('ag-input-credit').value);
    const type = document.getElementById('ag-input-type').value;
    const customFail = Number(document.getElementById('ag-input-fail').value);
    const weeklyLessons = Number(document.getElementById('ag-input-weekly').value);

    if (!name) return;
    const newCourse = { id: Date.now(), name, credit, type, customFail, weeklyLessons, current: 0, history: [], isTimetableLinked: false };
    saveAndSync([...courses, newCourse]);
    document.getElementById('ag-input-name').value = '';
    agCloseAddModal();
    showToast(name + ' を追加しました');
  };

  window.agOpenEditModal = function(id) {
    const target = courses.find(c => String(c.id) === String(id));
    if (!target) return;

    document.getElementById('ag-edit-id').value = target.id;
    document.getElementById('ag-edit-name').value = target.name;
    document.getElementById('ag-edit-credit').value = target.credit || 2;
    document.getElementById('ag-edit-type').value = target.type || 'half';
    document.getElementById('ag-edit-fail').value = target.customFail || (target.type === 'full' ? -21 : -11);
    document.getElementById('ag-edit-weekly').value = target.weeklyLessons || 1;

    document.getElementById('ag-edit-modal').classList.add('show');
  };
  window.agCloseEditModal = function() {
    document.getElementById('ag-edit-modal').classList.remove('show');
  };
  window.agEditCourseSubmit = function(e) {
    e.preventDefault();
    const id = document.getElementById('ag-edit-id').value;
    const name = document.getElementById('ag-edit-name').value.trim();
    const credit = Number(document.getElementById('ag-edit-credit').value);
    const type = document.getElementById('ag-edit-type').value;
    const customFail = Number(document.getElementById('ag-edit-fail').value);
    const weeklyLessons = Number(document.getElementById('ag-edit-weekly').value);

    const next = courses.map(c => {
      if (String(c.id) === String(id)) {
        return { ...c, name, credit, type, customFail, weeklyLessons };
      }
      return c;
    });
    saveAndSync(next);
    agCloseEditModal();
    showToast('科目設定を変更しました');
  };

  window.agDeleteCourseCurrent = function() {
    const id = document.getElementById('ag-edit-id').value;
    const target = courses.find(c => String(c.id) === String(id));
    if (!target) return;
    if (target.isTimetableLinked) {
      showToast('時間割連携科目は時間割ページから削除してください');
      return;
    }
    if (!confirm('科目「' + target.name + '」を削除しますか？')) return;
    const next = courses.filter(c => String(c.id) !== String(id));
    saveAndSync(next);
    agCloseEditModal();
    showToast('科目を削除しました');
  };

  window.agOpenConfigModal = function() {
    document.getElementById('ag-config-blob-id').textContent = blobId || '未接続 (LOCAL)';
    document.getElementById('ag-config-modal').classList.add('show');
  };
  window.agCloseConfigModal = function() {
    document.getElementById('ag-config-modal').classList.remove('show');
  };
  window.agTriggerSync = function() {
    showToast('同期状態: ' + (syncStatus === 'ok' ? 'クラウド同期済み' : 'ローカル保存中'));
  };

  
  document.addEventListener('DOMContentLoaded', () => {
    courses = loadAndMergeCourses();
    renderApp();
  });
  courses = loadAndMergeCourses();
  renderApp();
})();
</script>

    </main>
  </body>
</html>
