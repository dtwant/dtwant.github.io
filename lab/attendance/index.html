  if (el) el.innerHTML = '<pre style="color:#ef4444;padding:2rem;font-size:13px;white-space:pre-wrap;">JS ERROR: ' + msg + '\nLine: ' + line + '\nCol: ' + col + '\n' + (err && err.stack ? err.stack : '') + '</pre>';
};
</script>

<script>
(function() {
try {
  const { useState, useEffect, useRef, useMemo } = React;
  const h = htm.bind(React.createElement);

   
  const STORAGE_KEY = 'dt_attendance_v2';
  const BLOB_KEY = 'dt_attendance_blob';
  const SC_BLOB = '';
  const APP_KEY = 'attendance';

  const RULES = {
    half: { limit: -10, fail: -11, danger: -9, label: '半期' },
    full: { limit: -20, fail: -21, danger: -18, label: '通年' }
  };

  const DEFAULT_KEY = '$2a$10$iVNuU6AA4DGWLiU8/Gl.oOIvr166q/dgd995DrQ1ziA/9eSq7Fh7q';
  const getJbKey = () => {
    if (window.PWAConfigSync) {
      return window.PWAConfigSync.getApiKey();
    }
    return DEFAULT_KEY;
  };

  const binUrl = (id) => `https://api.jsonbin.io/v3/b/${id}/latest`;
  const binPut = (id) => `https://api.jsonbin.io/v3/b/${id}`;

  function App() {
    
    const [courses, setCourses] = useState([]);
    const [blobId, setBlobId] = useState(() => SC_BLOB || localStorage.getItem(BLOB_KEY) || null);
    const [syncStatus, setSyncStatus] = useState(blobId ? 'ok' : 'local');
    const [showConfig, setShowConfig] = useState(false);
    const [toastMsg, setToastMsg] = useState('');
    const [toastShow, setToastShow] = useState(false);
    
    
    const [newCourseName, setNewCourseName] = useState('');
    const [newCourseCredit, setNewCourseCredit] = useState(2);
    const [termType, setTermType] = useState('half'); 

    
    const [openedHistory, setOpenedHistory] = useState({});

    
    const toastTimerRef = useRef(null);

    
    const loadAndMergeCourses = (localList = null, remoteList = null) => {
      let local = localList;
      if (local === null) {
        try {
          local = JSON.parse(localStorage.getItem(STORAGE_KEY));
        } catch(e) {
          local = [];
        }
      }
      if (!Array.isArray(local)) {
        local = [];
      }
      if (local.length === 0 && !localStorage.getItem(STORAGE_KEY)) {
        local = [{ id: 1, name: 'サンプル: 物理学', type: 'half', credit: 2, current: 0, history: [] }];
      }

      let timetableCourses = [];
      try {
        const timetableData = JSON.parse(localStorage.getItem('dt_subject_progress_data')) || {};
        if (timetableData && typeof timetableData === 'object' && !Array.isArray(timetableData)) {
          timetableCourses = Object.keys(timetableData).map(subName => {
            const subjectData = timetableData[subName];
            let currentLoss = 0;
            const historyList = [];
            let maxIndex = 15;

            if (subjectData && typeof subjectData === 'object' && !Array.isArray(subjectData)) {
              Object.keys(subjectData).forEach(idxKey => {
                const idx = parseInt(idxKey);
                if (isNaN(idx)) return; 
                if (idx > 15) maxIndex = 30;

                const item = subjectData[idxKey];
                if (item === null || typeof item !== 'object') return; 

                let ts = Date.now() - (15 - idx) * 24 * 60 * 60 * 1000;
                if (item.date) {
                  const parsed = new Date(item.date).getTime();
                  if (!isNaN(parsed)) ts = parsed;
                }

                if (item.status === 'delayed') {
                  currentLoss -= 1;
                  historyList.push({
                    timestamp: ts,
                    delta: -1,
                    type: 'late',
                    memo: `第${idx}回講義: ${item.memo || ''}`
                  });
                } else if (item.status === 'offline') {
                  currentLoss -= 2;
                  historyList.push({
                    timestamp: ts,
                    delta: -2,
                    type: 'absent',
                    memo: `第${idx}回講義: ${item.memo || ''}`
                  });
                }
              });
            }

            historyList.sort((a, b) => a.timestamp - b.timestamp);

            return {
              id: `tt-${subName}`,
              name: subName,
              type: maxIndex > 15 ? 'full' : 'half',
              credit: 2,
              current: currentLoss,
              history: historyList,
              isTimetableLinked: true
            };
          });
        }
      } catch (e) {
        console.error('Failed to parse timetable data:', e);
      }

      const merged = [...timetableCourses];
      local.forEach(lc => {
        if (!lc || typeof lc !== 'object') return; 
        const matchedIndex = merged.findIndex(tc => tc.name === lc.name);
        if (matchedIndex !== -1) {
          merged[matchedIndex].credit = lc.credit || merged[matchedIndex].credit;
          merged[matchedIndex].type = lc.type || merged[matchedIndex].type;
          merged[matchedIndex].id = lc.id;
        } else if (!lc.isTimetableLinked) {
          merged.push({
            ...lc,
            history: Array.isArray(lc.history) ? lc.history : [],
            isTimetableLinked: false
          });
        }
      });

      return merged;
    };

    
    useEffect(() => {
      const merged = loadAndMergeCourses();
      setCourses(merged);
      saveLocal(merged);
    }, []);

    
    useEffect(() => {
      async function checkSync() {
        let currentBlobId = blobId;
        if (window.PWAConfigSync) {
          currentBlobId = await window.PWAConfigSync.syncAppBinId('attendance', blobId);
          if (currentBlobId !== blobId) {
            setBlobId(currentBlobId);
            if (currentBlobId) {
              localStorage.setItem(BLOB_KEY, currentBlobId);
            } else {
              localStorage.removeItem(BLOB_KEY);
            }
          }
        }
        if (currentBlobId) {
          syncCloud(true, currentBlobId);
        }
      }
      checkSync();

      const handleStorageChange = (e) => {
        if (e.key === 'dt_subject_progress_data' || e.key === STORAGE_KEY) {
          const next = loadAndMergeCourses();
          setCourses(next);
        }
      };
      window.addEventListener('storage', handleStorageChange);
      return () => window.removeEventListener('storage', handleStorageChange);
    }, []);

    
    const triggerToast = (msg) => {
      setToastMsg(msg);
      setToastShow(true);
      clearTimeout(toastTimerRef.current);
      toastTimerRef.current = setTimeout(() => {
        setToastShow(false);
      }, 2500);
    };

    
    const saveLocal = (nextCourses) => {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(nextCourses));
      } catch(e) {}
    };

    
    const syncCloud = async (silent = false, customBlobId = null) => {
      setSyncStatus('busy');
      const targetBlobId = customBlobId !== null ? customBlobId : blobId;
      const jbKey = getJbKey();

      try {
        if (!targetBlobId) {
          const latest = loadAndMergeCourses();
          const res = await fetch('https://api.jsonbin.io/v3/b', {
            method: 'POST',
            headers: {
              'X-Master-Key': jbKey,
              'Content-Type': 'application/json',
              'X-Bin-Name': 'attendance_guardian'
            },
            body: JSON.stringify({ courses: latest })
          });
          if (!res.ok) throw new Error('create error: ' + res.status);
          const json = await res.json();
          const nextId = json.metadata.id;
          setBlobId(nextId);
          localStorage.setItem(BLOB_KEY, nextId);
          if (window.PWAConfigSync) {
            await window.PWAConfigSync.syncAppBinId('attendance', nextId);
          }
          setSyncStatus('ok');
          if (!silent) triggerToast('クラウド同期保管庫を作成しました');
        } else {
          const res = await fetch(binUrl(targetBlobId), {
            headers: { 'X-Master-Key': jbKey },
            cache: 'no-store'
          });
          if (!res.ok) throw new Error('get error: ' + res.status);
          const json = await res.json();
          const record = json.record || json;
          const remoteCourses = Array.isArray(record.courses) ? record.courses : (Array.isArray(record) ? record : []);

          const latest = loadAndMergeCourses();
          const merged = loadAndMergeCourses(latest, remoteCourses);
          setCourses(merged);
          saveLocal(merged);

          const p = await fetch(binPut(targetBlobId), {
            method: 'PUT',
            headers: {
              'X-Master-Key': jbKey,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ courses: merged })
          });
          if (!p.ok) throw new Error('put error: ' + p.status);
          setSyncStatus('ok');
          if (!silent) triggerToast('クラウド同期を完了しました');
        }
      } catch(err) {
        setSyncStatus('error');
        if (!silent) triggerToast('同期エラー: ' + err.message);
        console.error(err);
      }
    };

    
    const pushBlob = async (nextCourses) => {
      if (!blobId) return;
      try {
        const p = await fetch(binPut(blobId), {
          method: 'PUT',
          headers: {
            'X-Master-Key': getJbKey(),
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ courses: nextCourses })
        });
        if (p.ok) setSyncStatus('ok');
        else setSyncStatus('error');
      } catch(e) {
        setSyncStatus('error');
      }
    };

    
    const toggleCourseType = (courseId) => {
      const nextCourses = courses.map(c => {
        if (c.id === courseId) {
          const nextType = c.type === 'half' ? 'full' : 'half';
          triggerToast(`${c.name} の期間を ${nextType === 'half' ? '半期' : '通年'} に変更しました`);
          return { ...c, type: nextType };
        }
        return c;
      });
      setCourses(nextCourses);
      saveLocal(nextCourses);
      pushBlob(nextCourses);
    };

    const toggleCourseCredit = (courseId) => {
      const nextCourses = courses.map(c => {
        if (c.id === courseId) {
          const nextCredit = c.credit === 4 ? 1 : c.credit + 1;
          triggerToast(`${c.name} の単位数を ${nextCredit} 単位に変更しました`);
          return { ...c, credit: nextCredit };
        }
        return c;
      });
      setCourses(nextCourses);
      saveLocal(nextCourses);
      pushBlob(nextCourses);
    };

    const handleUpdate = (id, delta, actionType) => {
      const nextCourses = courses.map(c => {
        if (c.id === id) {
          if (c.isTimetableLinked) return c; 
          const rule = RULES[c.type] || RULES.half;
          const nextVal = Math.min(0, c.current + delta);
          
          const nextHistory = [...c.history];
          if (actionType !== 'undo') {
            nextHistory.push({
              timestamp: Date.now(),
              delta: delta,
              type: actionType
            });
          }

          return {
            ...c,
            current: nextVal,
            history: nextHistory
          };
        }
        return c;
      });

      setCourses(nextCourses);
      saveLocal(nextCourses);
      pushBlob(nextCourses);
      
      const course = courses.find(c => c.id === id);
      if (course && actionType !== 'undo') {
        const typeLabel = actionType === 'late' ? '遅刻' : '欠席';
        triggerToast(`${course.name} に ${typeLabel} を記録しました`);
      } else if (course) {
        triggerToast(`${course.name} の数値を修正しました`);
      }
    };

    const handleUndoHistoryItem = (courseId, historyItemTimestamp, delta) => {
      const target = courses.find(c => c.id === courseId);
      if (target && target.isTimetableLinked) return; 

      const nextCourses = courses.map(c => {
        if (c.id === courseId) {
          const nextHistory = c.history.filter(h => h.timestamp !== historyItemTimestamp);
          const nextVal = Math.min(0, c.current - delta);
          return {
            ...c,
            current: nextVal,
            history: nextHistory
          };
        }
        return c;
      });

      setCourses(nextCourses);
      saveLocal(nextCourses);
      pushBlob(nextCourses);
      triggerToast('履歴の項目を削除し、カウンターを戻しました');
    };

    const handleDelete = (id, name) => {
      const target = courses.find(c => c.id === id);
      if (target && target.isTimetableLinked) {
        triggerToast('時間割連動科目の削除は時間割ページで行ってください');
        return;
      }
      if (!confirm(`科目「${name}」を削除しますか？`)) return;
      const nextCourses = courses.filter(c => c.id !== id);
      setCourses(nextCourses);
      saveLocal(nextCourses);
      pushBlob(nextCourses);
      triggerToast('科目を削除しました');
    };

    const handleAddCourse = (e) => {
      e.preventDefault();
      if (!newCourseName.trim()) return;

      
      if (courses.some(c => c.name.toLowerCase() === newCourseName.trim().toLowerCase())) {
        triggerToast('同名の科目が既に存在します');
        return;
      }

      const newCourse = {
        id: Date.now(),
        name: newCourseName.trim(),
        credit: Number(newCourseCredit),
        type: termType,
        current: 0,
        history: [],
        isTimetableLinked: false
      };

      const nextCourses = [...courses, newCourse];
      setCourses(nextCourses);
      saveLocal(nextCourses);
      pushBlob(nextCourses);

      setNewCourseName('');
      setNewCourseCredit(2);
      triggerToast(`${newCourse.name} を登録しました`);
    };

    
    const handleApplySettings = async (nextBlobId) => {
      const cleaned = nextBlobId.trim();
      if (cleaned !== (blobId || '')) {
        const nextId = cleaned || null;
        setBlobId(nextId);
        if (nextId) {
          localStorage.setItem(BLOB_KEY, nextId);
        } else {
          localStorage.removeItem(BLOB_KEY);
        }
        if (window.PWAConfigSync) {
          await window.PWAConfigSync.syncAppBinId('attendance', nextId);
        }
        setShowConfig(false);
        triggerToast('システム設定を適用しました');
        if (nextId) {
          setTimeout(() => syncCloud(false, nextId), 100);
        }
      } else {
        setShowConfig(false);
      }
    };

    const handleClearAll = () => {
      if (!confirm('本当にすべての科目データを削除しますか？この操作は取り消せません。')) return;
      setCourses([]);
      saveLocal([]);
      pushBlob([]);
      setShowConfig(false);
      triggerToast('全データを削除しました');
    };

    const handleExport = () => {
      const blob = new Blob([JSON.stringify({ courses }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `attendance_guardian_${Date.now()}.json`;
      a.click();
      triggerToast('バックアップをエクスポートしました');
    };

    const handleImport = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const parsed = JSON.parse(evt.target.result);
          const imported = Array.isArray(parsed.courses) ? parsed.courses : (Array.isArray(parsed) ? parsed : []);
          const merged = mergeData(courses, imported);
          setCourses(merged);
          saveLocal(merged);
          pushBlob(merged);
          triggerToast('バックアップをインポートしました');
        } catch(err) {
          triggerToast('データのインポートに失敗しました');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    };

    
    const toggleHistory = (courseId) => {
      setOpenedHistory(prev => ({
        ...prev,
        [courseId]: !prev[courseId]
      }));
    };

    
    const stats = useMemo(() => {
      const totalCredits = courses.reduce((acc, c) => acc + (c && typeof c.credit === 'number' ? c.credit : 0), 0);
      const dangerCount = courses.filter(c => {
        if (!c) return false;
        const rule = RULES[c.type] || RULES.half;
        return c.current <= rule.danger && c.current > rule.fail;
      }).length;
      const failCount = courses.filter(c => {
        if (!c) return false;
        const rule = RULES[c.type] || RULES.half;
        return c.current <= rule.fail;
      }).length;
      return { totalCredits, dangerCount, failCount };
    }, [courses]);

    return h`
      <div class="ag-container">
        \x3C!-- Header -->
        <div class="ag-title-bar">
          <div>
            <h1 class="ag-hud-title">_ATTEND_GUARDIAN</h1>
            <div class="ag-hud-desc">> SYS_STATUS: ACTIVE // 出欠モニター</div>
          </div>
          <div class="ag-title-actions">
            <button class="ag-btn" onClick=${() => window.history.back()}>◀ EXIT</button>
            <span class=${`ag-sync-status ${syncStatus === 'ok' ? 'ok' : syncStatus === 'busy' ? 'busy' : syncStatus === 'error' ? 'error' : 'local'}`} onClick=${() => syncCloud()}>
              ${syncStatus === 'ok' ? '● SYNCED' : syncStatus === 'busy' ? '◌ SYNCING...' : syncStatus === 'error' ? '✕ ERROR' : '◌ LOCAL'}
            </span>
            <button class="ag-btn ag-btn-icon" onClick=${() => syncCloud()} title="今すぐ同期">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/></svg>
            </button>
            <button class="ag-btn ag-btn-icon" onClick=${() => setShowConfig(true)} title="設定">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
          </div>
        </div>

        \x3C!-- Stats Cards -->
        <section class="ag-stats-grid">
          <div class="ag-card">
            <div style=${ { fontSize: '0.75rem', color: '#a1a1aa', textTransform: 'uppercase', letterSpacing: '0.05em' } }>総登録単位数</div>
            <div class="ag-stat-num">${stats.totalCredits}<span class="ag-stat-sub">(${courses.length}科目)</span></div>
          </div>
          <div class="ag-card">
            <div style=${ { fontSize: '0.75rem', color: '#a1a1aa', textTransform: 'uppercase', letterSpacing: '0.05em' } }>要注意 / 落単回避不可</div>
            <div class="ag-stat-num">
              <span style=${ { color: stats.dangerCount > 0 ? '#f59e0b' : '#3f3f46' } }>${stats.dangerCount}</span>
              <span style=${ { color: '#27272a', margin: '0 0.5rem' } }>/</span>
              <span style=${ { color: stats.failCount > 0 ? '#ef4444' : '#3f3f46' } }>${stats.failCount}</span>
            </div>
          </div>
        </section>

        \x3C!-- Course List -->
        <section class="ag-container" style=${ { gap: '1rem' } }>
          ${courses.map(course => {
            const rule = RULES[course.type] || RULES.half;
            const currentVal = course.current;
            const limitVal = rule.limit;
            const failVal = rule.fail;
            const isFailed = currentVal <= failVal;
            const isDanger = currentVal <= rule.danger && currentVal > failVal;
            const statusClass = isFailed ? 'danger' : isDanger ? 'warn' : 'safe';
            
            
            const remainingToFail = Math.max(0, currentVal - failVal); 
            
            const percent = Math.min((Math.abs(currentVal) / Math.abs(limitVal)) * 100, 100);
            
            
            const donutBgColor = isFailed ? '#ef4444' : isDanger ? '#f59e0b' : '#10b981';
            const donutStyle = {
              background: `conic-gradient(${donutBgColor} ${percent}%, #1e1e24 0%)`
            };

            const isHistoryOpen = !!openedHistory[course.id];

            return h`
              <div key=${course.id} class=${`ag-card ag-course-card ${statusClass}`}>
                <div class="ag-course-card-top">
                  <div style=${ { minWidth: 0, flex: 1 } }>
                    <div style=${ { display: 'flex', alignItems: 'center', gap: '0.75rem' } }>
                      <span class="ag-card-title">${course.name}</span>
                      ${!course.isTimetableLinked && h`
                        <button style=${ { background: 'none', border: 'none', color: '#ef4444', cursor: 'pointer' } } onClick=${() => handleDelete(course.id, course.name)}>
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        </button>
                      `}
                    </div>
                    <div class="ag-course-meta">
                      <span class="ag-badge" style=${ { cursor: 'pointer' } } onClick=${() => toggleCourseCredit(course.id)} title="クリックで単位数を変更">${course.credit}単位 ✎</span>
                      <span class="ag-badge" style=${ { cursor: 'pointer' } } onClick=${() => toggleCourseType(course.id)} title="クリックで半期/通年を変更">${rule.label} ✎</span>
                      ${course.isTimetableLinked && h`<span class="ag-badge" style=${ { background: 'rgba(6, 182, 212, 0.1)', color: '#06b6d4', borderColor: 'rgba(6, 182, 212, 0.2)' } }>時間割連動 🔗</span>`}
                      ${isFailed && h`<span class="ag-badge" style=${ { background: 'rgba(239,68,68,0.1)', color: '#ef4444', borderColor: 'rgba(239,68,68,0.2)' } }>落単アウト</span>`}
                    </div>
                  </div>
                  
                  \x3C!-- Round Donut HUD -->
                  <div class="ag-donut-container" style=${donutStyle}>
                    <div class="ag-donut-center">
                      <span style=${ { fontSize: '0.8rem', fontWeight: 'bold', color: donutBgColor } }>${currentVal}</span>
                      <span style=${ { fontSize: '0.5rem', color: '#71717a' } }>limit ${limitVal}</span>
                    </div>
                  </div>
                </div>

                \x3C!-- Custom Linear HUD Gauge -->
                <div class="ag-meter-container">
                  <div class="ag-meter-labels">
                    <span style=${ { color: isFailed ? '#ef4444' : '#a1a1aa' } }>
                      ${isFailed ? '落単確定' : `あと欠席 ${Math.floor(remainingToFail / 2)}回（または遅刻 ${remainingToFail}回）でアウト`}
                    </span>
                    <span class="ag-hud-desc" style=${ { color: donutBgColor } }>
                      ${Math.round(percent)}% RISK
                    </span>
                  </div>
                  <div class="ag-meter-bg">
                    <div class="ag-meter-fill" style=${ { width: `${percent}%` } }></div>
                  </div>
                </div>

                \x3C!-- Interactive controls -->
                ${course.isTimetableLinked ? h`
                  <div style=${ { gridColumn: 'span 3', display: 'flex', width: '100%' } }>
                    <a href="/project-x/timetable/" class="ag-control-btn" style=${ { width: '100%', textDecoration: 'none', color: '#06b6d4', borderColor: 'rgba(6, 182, 212, 0.3)', background: 'rgba(6, 182, 212, 0.03)', flexDirection: 'row', gap: '0.5rem', padding: '0.65rem 0.5rem' } }>
                      <span>🔗 TIMETABLE LOG で出欠を記録する</span>
                    </a>
                  </div>
                ` : h`
                  <div class="ag-course-controls">
                    <button class="ag-control-btn late" onClick=${() => handleUpdate(course.id, -1, 'late')} disabled=${isFailed}>
                      <span>遅刻</span>
                      <span class="sub-label">-1点</span>
                    </button>
                    <button class="ag-control-btn absent" onClick=${() => handleUpdate(course.id, -2, 'absent')} disabled=${isFailed}>
                      <span>欠席</span>
                      <span class="sub-label">-2点</span>
                    </button>
                    <button class="ag-control-btn" onClick=${() => handleUpdate(course.id, 1, 'undo')} title="手動微修正 (＋1)">
                      <span>＋1点</span>
                      <span class="sub-label">手動</span>
                    </button>
                  </div>
                `}

                \x3C!-- History toggle -->
                <div>
                  <button class="ag-history-trigger" onClick=${() => toggleHistory(course.id)}>
                    <span>履歴 (${course.history.length})</span>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style=${ { transform: isHistoryOpen ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' } }><path d="m6 9 6 6 6-6"/></svg>
                  </button>

                  ${isHistoryOpen && h`
                    <div class="ag-history-panel">
                      ${(!course.history || course.history.length === 0) ? h`
                        <div style=${ { textAlign: 'center', fontSize: '0.7rem', color: '#3f3f46', padding: '0.5rem' } }>出欠履歴がありません</div>
                      ` : course.history.map(item => {
                        if (!item) return null;
                        const dateStr = item.timestamp ? new Date(item.timestamp).toLocaleDateString('ja-JP', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '不明';
                        return h`
                          <div key=${item.timestamp} class="ag-history-item">
                            <span class=${`ag-history-badge ${item.type || 'late'}`}>
                              ${item.type === 'late' ? '遅刻' : '欠席'} (${item.delta || 0})
                            </span>
                            <span style=${ { color: '#71717a', fontSize: '0.7rem' } }>${dateStr}</span>
                            ${!course.isTimetableLinked && h`
                              <button class="ag-history-undo-btn" onClick=${() => handleUndoHistoryItem(course.id, item.timestamp, item.delta)} title="このイベントを消去しカウンターを戻す">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                              </button>
                            `}
                          </div>
                        `;
                      })}
                    </div>
                  `}
                </div>
              </div>
            `;
          })}
        </section>

        \x3C!-- Add Course Form -->
        <section class="ag-card">
          <h2 class="ag-card-title" style=${ { color: '#10b981', borderBottom: '1px solid hsl(var(--border))', paddingBottom: '0.75rem', marginBottom: '1.25rem' } }>+ NEW_COURSE_REGISTRY</h2>
          <form onSubmit=${handleAddCourse} class="ag-form-layout">
            <div class="ag-form-row">
              <input type="text" placeholder="授業名を入力 (例: 線形代数学)" class="ag-input" value=${newCourseName} onChange=${e => setNewCourseName(e.target.value)} required />
              <input type="number" placeholder="単位" class="ag-input" min="1" max="10" value=${newCourseCredit} onChange=${e => setNewCourseCredit(e.target.value)} required />
            </div>
            
            <div style=${ { display: 'flex', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap', gap: '1rem' } }>
              <div class="ag-radio-tabs" style=${ { width: '220px' } }>
                <div class=${`ag-radio-tab ${termType === 'half' ? 'active' : ''}`} onClick=${() => setTermType('half')}>半期</div>
                <div class=${`ag-radio-tab ${termType === 'full' ? 'active' : ''}`} onClick=${() => setTermType('full')}>通年</div>
              </div>
              
              <button type="submit" class="ag-btn ag-btn-primary" style=${ { padding: '0.65rem 2rem' } }>科目を追加</button>
            </div>
          </form>
        </section>

        \x3C!-- System usage guide -->
        <section class="ag-card" style=${ { fontSize: '0.8rem', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem', flexWrap: 'wrap' } }>
          <div>
            <h4 style=${ { fontFamily: 'Orbitron', color: '#10b981', marginBottom: '0.5rem' } }>[FALLOUT_LINE]</h4>
            <div style=${ { color: '#a1a1aa', lineHeight: '1.6' } }>
              各科目の欠席・遅刻による減点は以下の基準で計算されます。
              <div style=${ { display: 'flex', gap: '1rem', marginTop: '0.4rem', fontFamily: 'JetBrains Mono', fontSize: '0.75rem' } }>
                <span style=${ { color: '#f59e0b' } }>遅刻: -1点</span>
                <span style=${ { color: '#ef4444' } }>欠席: -2点</span>
              </div>
              <ul style=${ { listStyle: 'circle', paddingLeft: '1.25rem', marginTop: '0.5rem', fontSize: '0.75rem' } }>
                <li><strong>半期科目</strong>: -11点で自動落単アウト</li>
                <li><strong>通年科目</strong>: -21点で自動落単アウト</li>
              </ul>
            </div>
          </div>
          <div>
            <h4 style=${ { fontFamily: 'Orbitron', color: '#3b82f6', marginBottom: '0.5rem' } }>[CLOUD_PROTOCOL]</h4>
            <div style=${ { color: '#a1a1aa', lineHeight: '1.6', fontSize: '0.75rem' } }>
              データはローカルストレージと jsonbin.io クラウドに即時同期されます。
              右上の ⚙ 設定 から Blob ID を取得・入力すれば、スマートフォンや他のブラウザとの二重連携が可能です。
            </div>
          </div>
        </section>

        \x3C!-- Settings Modal Overlay -->
        <div class=${`ag-overlay ${showConfig ? 'show' : ''}`} onClick=${(e) => e.target.classList.contains('ag-overlay') && setShowConfig(false)}>
          <div class="ag-modal">
            <div class="ag-modal-header">
              <span style=${ { fontFamily: 'Orbitron', fontWeight: 'bold' } }>⚙️ SYSTEM CONFIGURATION</span>
              <button style=${ { background: 'none', border: 'none', color: '#71717a', cursor: 'pointer', fontSize: '1.2rem' } } onClick=${() => setShowConfig(false)}>×</button>
            </div>
            
            <div style=${ { display: 'flex', flexDirection: 'column', gap: '1.25rem' } }>
              <div>
                <label style=${ { fontSize: '0.7rem', color: '#71717a', textTransform: 'uppercase', display: 'block', marginBottom: '0.35rem' } }>Current Connection Sync ID</label>
                <div class="ag-blob-display">${blobId || '（未同期／ローカル保存のみ）'}</div>
              </div>
              
              <div>
                <label style=${ { fontSize: '0.7rem', color: '#71717a', textTransform: 'uppercase', display: 'block', marginBottom: '0.35rem' } }>Apply Existing Sync ID</label>
                <input type="text" id="ag-blob-input" class="ag-input" placeholder="接続IDを入力してロード" defaultValue=${blobId || ''} />
              </div>

              <div style=${ { borderTop: '1px solid hsl(var(--border))', paddingTop: '1rem' } }>
                <span style=${ { fontSize: '0.7rem', color: '#71717a', textTransform: 'uppercase', display: 'block', marginBottom: '0.5rem' } }>Data Backup & Purge</span>
                <div style=${ { display: 'flex', gap: '0.5rem', flexWrap: 'wrap' } }>
                  <button class="ag-btn" onClick=${handleExport}>📤 エクスポート</button>
                  <label class="ag-btn" style=${ { cursor: 'pointer' } }>
                    📥 インポート
                    <input type="file" accept=".json" style=${ { display: 'none' } } onChange=${handleImport} />
                  </label>
                  <button class="ag-btn ag-btn-primary" style=${ { background: 'rgba(239,68,68,0.1)', color: '#ef4444', border: '1px solid rgba(239,68,68,0.2)' } } onClick=${handleClearAll}>🗑️ 全データ削除</button>
                </div>
              </div>
            </div>

            <div class="ag-modal-footer">
              <button class="ag-btn" onClick=${() => setShowConfig(false)}>キャンセル</button>
              <button class="ag-btn ag-btn-primary" onClick=${() => {
                const val = document.getElementById('ag-blob-input').value;
                handleApplySettings(val);
              }}>適用</button>
            </div>
          </div>
        </div>

        \x3C!-- Toast Notification -->
        <div class=${`ag-toast ${toastShow ? 'show' : ''}`}>
          ${toastMsg}
        </div>
      </div>
    `;
  }

  try {
    ReactDOM.createRoot(document.getElementById('ag-root')).render(h`<${App} />`);
  } catch(mountErr) {
    console.error('MOUNT ERROR:', mountErr);
    document.getElementById('ag-root').innerHTML = '<pre style="color:red;padding:2rem;font-size:14px;">MOUNT ERROR: ' + mountErr.message + '\n' + mountErr.stack + '</pre>';
  }
} catch(globalErr) {
  console.error('GLOBAL SCRIPT ERROR:', globalErr);
  var el = document.getElementById('ag-root');
  if (el) el.innerHTML = '<pre style="color:red;padding:2rem;font-size:14px;">SCRIPT ERROR: ' + globalErr.message + '\n' + globalErr.stack + '</pre>';
}
})();
</script>

    </main>
  </body>
</html>
