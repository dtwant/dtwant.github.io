  padding: 0.5rem 0.75rem; background: hsl(var(--muted)); 
  border-radius: var(--radius); word-break: break-all; 
  margin-bottom: 1rem; border: 1px solid hsl(var(--border)); 
  color: hsl(var(--primary)); font-weight: 500; user-select: all;
}

 
@media (max-width: 768px) {
  .tl-container { padding: 1rem 0.5rem 5rem; }
  .tl-header { flex-direction: column; align-items: stretch; gap: 0.75rem; margin-bottom: 1.5rem; }
  .tl-header-actions { width: 100%; justify-content: space-between; }
  .tl-stats-grid { grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin-bottom: 1rem; }
  .tl-stat-card { padding: 0.75rem; }
  .tl-stat-value { font-size: 1.25rem; }
  
  .tl-toolbar { flex-direction: column; align-items: stretch; gap: 0.5rem; margin-bottom: 0.75rem; }
  .tl-toolbar-right { width: 100%; }
  .tl-search-wrap { flex: 1; }
  .tl-search-input { width: 100%; }
  .tl-tabs-list { width: 100%; display: flex; }
  .tl-tabs-trigger { flex: 1; }
  
  .tl-item { padding: 0.75rem; gap: 0.75rem; }
  .tl-item-actions { opacity: 1; }
  
  .tl-field-row { grid-template-columns: 1fr; }
  .tl-dialog { max-width: 95vw; }
  .tl-toast-container { left: 1rem; right: 1rem; bottom: 1rem; max-width: none; }
}
</style>


<div class="tl-root">
  <div class="tl-bg"></div>
  <div id="tl-app-mount"></div>
</div>

<script>
(function() {
  const { useState, useEffect, useRef, useMemo } = React;
  const html = htm.bind(React.createElement);

  
  
  
  const STORAGE_KEY = 'dt_tasks_v1';
  const BLOB_KEY = 'dt_tasks_blob';
  const PASS_CODE = "0723";
  
  
  const JB_KEY = '$2a$10$iVNuU6AA4DGWLiU8/Gl.oOIvr166q/dgd995DrQ1ziA/9eSq7Fh7q';
  const JB_CREATE = 'https://api.jsonbin.io/v3/b';
  const JB_HDR = () => ({ 'X-Master-Key': JB_KEY, 'Content-Type': 'application/json' });
  const binUrl = (id) => `https://api.jsonbin.io/v3/b/${id}/latest`;
  const binPut = (id) => `https://api.jsonbin.io/v3/b/${id}`;

  
  let INITIAL_YAML = [];
  try {
    INITIAL_YAML = [{"done":false,"due":"至急","note":"評価配点大きい","priority":"S","task":"電算レポート"},{"done":false,"due":"2025/12/15の週","note":"範囲は画像参照のこと","priority":"A","task":"微積レポート"},{"done":false,"due":"なるはや 12月中","note":"必要なら池田に聞く！","priority":"A","task":"物理のレポート+過去の課題確認"},{"done":false,"due":"-","note":"急ぎではないが残りは確実に提出","priority":"S","task":"倫理レポート"},{"done":true,"due":"2025-12-07","note":"完了","priority":"S","task":"サイトのメニュー構築"},{"done":false,"due":"-","note":"過去の手書きの内容もまとめたい","priority":"A","task":"物理数学の記事の続き"},{"done":false,"due":"-","note":"写真撮っておかないと書けないので注意","priority":"A","task":"植物の記事を書いてまとめる"}];
  } catch(e) {}

  
  function getDueStatus(dueStr) {
    if (!dueStr) return { label: '', className: '' };
    
    
    let targetDate = null;
    const now = new Date();
    now.setHours(0,0,0,0);
    
    const jpMatch = dueStr.match(/(\d+)月(\d+)日/);
    if (jpMatch) {
      const year = now.getFullYear();
      const month = parseInt(jpMatch[1], 10) - 1;
      const day = parseInt(jpMatch[2], 10);
      targetDate = new Date(year, month, day);
      
      if (targetDate < now && (now - targetDate) > 30 * 24 * 60 * 60 * 1000) {
        targetDate.setFullYear(year + 1);
      }
    } else {
      const parsed = Date.parse(dueStr.replace(/年|月/g, '-').replace(/日/g, ''));
      if (!isNaN(parsed)) {
        targetDate = new Date(parsed);
      }
    }
    
    if (!targetDate) return { label: dueStr, className: '' };
    
    targetDate.setHours(0,0,0,0);
    const diffTime = targetDate - now;
    const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
    
    if (diffDays < 0) {
      return { label: `期限超過 (${Math.abs(diffDays)}日前: ${dueStr})`, className: 'tl-due-overdue' };
    } else if (diffDays === 0) {
      return { label: `今日締め切り (${dueStr})`, className: 'tl-due-overdue' };
    } else if (diffDays <= 3) {
      return { label: `期限間近 (${diffDays}日後: ${dueStr})`, className: 'tl-due-soon' };
    }
    
    return { label: `期限: ${dueStr}`, className: '' };
  }

  
  
  
  function App() {
    
    const [unlocked, setUnlocked] = useState(() => sessionStorage.getItem('tl_unlocked') === 'true');
    const [pinCode, setPinCode] = useState('');
    const [pinError, setPinError] = useState(false);

    
    const [tasks, setTasks] = useState([]);
    const [blobId, setBlobId] = useState(() => localStorage.getItem(BLOB_KEY) || null);
    
    
    const [syncStatus, setSyncStatus] = useState('local'); 
    
    
    const [statusFilter, setStatusFilter] = useState('active'); 
    const [priorityFilter, setPriorityFilter] = useState('all'); 
    const [searchQuery, setSearchQuery] = useState('');
    const [sortKey, setSortKey] = useState('priority'); 
    
    
    const [isConfigOpen, setIsConfigOpen] = useState(false);
    const [isAddOpen, setIsAddOpen] = useState(false);
    const [editTask, setEditTask] = useState(null); 
    
    
    const [newObj, setNewObj] = useState('');
    const [newPri, setNewPri] = useState('B');
    const [newDue, setNewDue] = useState('');
    const [newNote, setNewNote] = useState('');

    
    const [configBlobInput, setConfigBlobInput] = useState('');

    
    const [toasts, setToasts] = useState([]);

    
    const searchInputRef = useRef(null);

    
    const addToast = (msg, type = 'info') => {
      const id = Date.now();
      setToasts(prev => [...prev, { id, msg, type, show: true }]);
      setTimeout(() => {
        setToasts(prev => prev.map(t => t.id === id ? { ...t, show: false } : t));
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, 300);
      }, 2500);
    };

    
    useEffect(() => {
      let localTasks = null;
      try {
        localTasks = JSON.parse(localStorage.getItem(STORAGE_KEY));
      } catch(e) {}

      if (localTasks && Array.isArray(localTasks)) {
        
        const sanitized = localTasks.map((t, i) => ({
          id: t.id || (Date.now() + i),
          task: String(t.task || ''),
          priority: t.priority || 'B',
          due: String(t.due || ''),
          done: !!t.done,
          note: String(t.note || ''),
          createdAt: t.createdAt || (Date.now() - i * 1000)
        }));
        setTasks(sanitized);
      } else if (INITIAL_YAML && Array.isArray(INITIAL_YAML) && INITIAL_YAML.length > 0) {
        const mapped = INITIAL_YAML.map((t, i) => ({
          id: Date.now() + i,
          task: String(t.task || ''),
          priority: t.priority || 'B',
          due: String(t.due || ''),
          done: !!t.done,
          note: String(t.note || ''),
          createdAt: Date.now() - (INITIAL_YAML.length - i) * 1000
        }));
        setTasks(mapped);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(mapped));
      }
    }, []);

    
    useEffect(() => {
      if (unlocked && blobId) {
        syncCloud(true);
      }
    }, [unlocked]);

    
    useEffect(() => {
      const handleKeyDown = (e) => {
        if (unlocked && e.key === '/' && document.activeElement !== searchInputRef.current && !isConfigOpen && !isAddOpen && !editTask) {
          e.preventDefault();
          searchInputRef.current?.focus();
        }
      };
      window.addEventListener('keydown', handleKeyDown);
      return () => window.removeEventListener('keydown', handleKeyDown);
    }, [unlocked, isConfigOpen, isAddOpen, editTask]);

    
    const verifyPin = (code) => {
      if (code === PASS_CODE) {
        setUnlocked(true);
        sessionStorage.setItem('tl_unlocked', 'true');
        addToast('ACCESS GRANTED', 'success');
      } else {
        setPinError(true);
        addToast('ACCESS DENIED', 'error');
        setTimeout(() => {
          setPinCode('');
          setPinError(false);
        }, 800);
      }
    };

    
    const handlePinPress = (val) => {
      if (pinError) return;
      if (val === 'clear') {
        setPinCode('');
      } else if (val === 'back') {
        setPinCode(prev => prev.slice(0, -1));
      } else {
        if (pinCode.length < 4) {
          const newCode = pinCode + val;
          setPinCode(newCode);
          if (newCode.length === 4) {
            setTimeout(() => verifyPin(newCode), 150);
          }
        }
      }
    };

    
    useEffect(() => {
      if (unlocked) return;
      const handlePhysKey = (e) => {
        if (e.key >= '0' && e.key <= '9') {
          handlePinPress(e.key);
        } else if (e.key === 'Backspace') {
          handlePinPress('back');
        } else if (e.key === 'Escape') {
          handlePinPress('clear');
        }
      };
      window.addEventListener('keydown', handlePhysKey);
      return () => window.removeEventListener('keydown', handlePhysKey);
    }, [pinCode, unlocked, pinError]);

    
    const saveLocal = (updatedTasks) => {
      setTasks(updatedTasks);
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(updatedTasks));
      } catch(e) {}
    };

    
    const syncCloud = async (silent = false) => {
      setSyncStatus('busy');
      let currentBlobId = blobId;
      try {
        if (!currentBlobId) {
          
          const res = await fetch(JB_CREATE, {
            method: 'POST',
            headers: { ...JB_HDR(), 'X-Bin-Name': 'tasks_log' },
            body: JSON.stringify({ tasks })
          });
          if (!res.ok) throw new Error(`create: ${res.status}`);
          const json = await res.json();
          currentBlobId = json.metadata.id;
          setBlobId(currentBlobId);
          localStorage.setItem(BLOB_KEY, currentBlobId);
          setSyncStatus('ok');
          if (!silent) addToast('CLOUD STORAGE SYNCED', 'success');
        } else {
          
          const r = await fetch(binUrl(currentBlobId), { headers: { 'X-Master-Key': JB_KEY }, cache: 'no-store' });
          if (!r.ok) {
            if ([400, 401, 403, 404, 422].includes(r.status)) {
              setBlobId(null);
              localStorage.removeItem(BLOB_KEY);
              if (!silent) addToast('INVALID BLOB ID: RE-SYNCING...', 'error');
              return syncCloud(silent);
            }
            throw new Error(`get: ${r.status}`);
          }
          const json = await r.json();
          const rec = json.record || json;
          const remoteTasks = Array.isArray(rec.tasks) ? rec.tasks : Array.isArray(rec) ? rec : [];
          
          
          const merged = mergeTasks(tasks, remoteTasks);
          saveLocal(merged);
          
          
          const p = await fetch(binPut(currentBlobId), {
            method: 'PUT',
            headers: JB_HDR(),
            body: JSON.stringify({ tasks: merged })
          });
          if (!p.ok) throw new Error(`put: ${p.status}`);
          setSyncStatus('ok');
          if (!silent) addToast('SYNC COMPLETE', 'success');
        }
      } catch(e) {
        setSyncStatus('err');
        if (!silent) addToast('SYNC FAILURE', 'error');
        console.error(e);
      }
    };

    const pushToCloud = async (currentTasks) => {
      if (!blobId) return;
      try {
        const p = await fetch(binPut(blobId), {
          method: 'PUT',
          headers: JB_HDR(),
          body: JSON.stringify({ tasks: currentTasks })
        });
        if (p.ok) setSyncStatus('ok');
        else setSyncStatus('err');
      } catch(e) {
        setSyncStatus('err');
      }
    };

    const mergeTasks = (local, remote) => {
      const byId = {};
      const allTasks = [...(Array.isArray(remote) ? remote : []), ...(Array.isArray(local) ? local : [])];
      allTasks.forEach((t, idx) => {
        const id = t.id || (Date.now() + idx);
        byId[id] = {
          ...t,
          id: id,
          task: String(t.task || ''),
          priority: t.priority || 'B',
          due: String(t.due || ''),
          done: !!t.done,
          note: String(t.note || ''),
          createdAt: t.createdAt || (Date.now() - idx * 1000)
        };
      });
      return Object.values(byId);
    };

    
    const toggleTask = (id) => {
      const updated = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      saveLocal(updated);
      pushToCloud(updated);
      addToast(updated.find(t => t.id === id).done ? 'TASK COMPLETED' : 'TASK REVERTED');
    };

    
    const deleteTask = (id) => {
      if (!confirm('CONFIRM DELETION?')) return;
      const updated = tasks.filter(t => t.id !== id);
      saveLocal(updated);
      pushToCloud(updated);
      addToast('TASK DELETED', 'info');
    };

    
    const handleCreateTask = (e) => {
      if (e) e.preventDefault();
      if (!newObj.trim()) {
        addToast('OBJECTIVE IS REQUIRED', 'error');
        return;
      }
      const newTask = {
        id: Date.now(),
        task: newObj.trim(),
        priority: newPri,
        due: newDue.trim(),
        done: false,
        note: newNote.trim(),
        createdAt: Date.now()
      };
      const updated = [...tasks, newTask];
      saveLocal(updated);
      pushToCloud(updated);
      
      
      setNewObj('');
      setNewPri('B');
      setNewDue('');
      setNewNote('');
      setIsAddOpen(false);
      
      addToast('TASK DEPLOYED', 'success');
    };

    
    const handleSaveEdit = (e) => {
      if (e) e.preventDefault();
      if (!editTask.task.trim()) {
        addToast('OBJECTIVE IS REQUIRED', 'error');
        return;
      }
      const updated = tasks.map(t => t.id === editTask.id ? editTask : t);
      saveLocal(updated);
      pushToCloud(updated);
      setEditTask(null);
      addToast('TASK UPDATED', 'success');
    };

    
    const handleApplyConfig = () => {
      const cleanedInput = configBlobInput.trim();
      if (cleanedInput !== (blobId || '')) {
        const nextBlobId = cleanedInput || null;
        setBlobId(nextBlobId);
        if (nextBlobId) {
          localStorage.setItem(BLOB_KEY, nextBlobId);
        } else {
          localStorage.removeItem(BLOB_KEY);
        }
        setIsConfigOpen(false);
        addToast('SYSTEM CONFIG UPDATED', 'success');
        
        
        setTimeout(() => {
          syncCloud(false);
        }, 100);
      } else {
        setIsConfigOpen(false);
      }
    };

    
    const handleWipeAll = () => {
      if (confirm('WIPE ALL TASK DATA FROM THIS DEVICE? THIS CANNOT BE UNDONE.')) {
        saveLocal([]);
        pushToCloud([]);
        setIsConfigOpen(false);
        addToast('SYSTEM WIPED CLEAN', 'error');
      }
    };

    
    const handleExport = () => {
      const blob = new Blob([JSON.stringify({ tasks }, null, 2)], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `tasks_backup_${new Date().toISOString().slice(0, 10)}.json`;
      a.click();
      addToast('EXPORT COMPLETED', 'success');
    };

    
    const handleImport = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = (evt) => {
        try {
          const data = JSON.parse(evt.target.result);
          const imported = Array.isArray(data.tasks) ? data.tasks : Array.isArray(data) ? data : [];
          
          if (imported.length === 0) {
            addToast('NO VALID TASKS FOUND IN FILE', 'error');
            return;
          }
          
          const sanitized = imported.map((t, idx) => ({
            id: t.id || (Date.now() + idx),
            task: String(t.task || 'Unnamed Objective'),
            priority: t.priority || 'B',
            due: String(t.due || ''),
            done: !!t.done,
            note: String(t.note || ''),
            createdAt: t.createdAt || Date.now()
          }));
          
          const merged = mergeTasks(tasks, sanitized);
          saveLocal(merged);
          pushToCloud(merged);
          addToast(`IMPORTED ${sanitized.length} TASKS`, 'success');
        } catch(err) {
          addToast('IMPORT FAILED: INVALID FILE FORMAT', 'error');
        }
      };
      reader.readAsText(file);
      e.target.value = ''; 
    };

    
    const stats = useMemo(() => {
      const total = tasks.length;
      const completed = tasks.filter(t => t.done).length;
      const pending = total - completed;
      const prioritySCount = tasks.filter(t => !t.done && ((t.priority || 'B') === 'S' || (t.priority || 'B') === 'SS')).length;
      
      
      const soonCount = tasks.filter(t => {
        if (t.done || !t.due) return false;
        const status = getDueStatus(t.due);
        return status.className === 'tl-due-soon' || status.className === 'tl-due-overdue';
      }).length;

      return { total, completed, pending, priorityS: prioritySCount, soon: soonCount };
    }, [tasks]);

    
    const processedTasks = useMemo(() => {
      let result = [...tasks];

      
      if (searchQuery.trim()) {
        const q = searchQuery.toLowerCase();
        result = result.filter(t => {
          const taskStr = String(t.task || '').toLowerCase();
          const noteStr = String(t.note || '').toLowerCase();
          const dueStr = String(t.due || '').toLowerCase();
          return taskStr.includes(q) || noteStr.includes(q) || dueStr.includes(q);
        });
      }

      
      if (statusFilter === 'active') {
        result = result.filter(t => !t.done);
      } else if (statusFilter === 'completed') {
        result = result.filter(t => t.done);
      }

      
      if (priorityFilter !== 'all') {
        result = result.filter(t => t.priority === priorityFilter);
      }

      
      const priorityMap = { 'S': 0, 'SS': 0, 'A': 1, 'B': 2, 'C': 3 };
      result.sort((a, b) => {
        
        if (a.done !== b.done) return a.done ? 1 : -1;

        if (sortKey === 'priority') {
          const pa = priorityMap[a.priority || 'B'] ?? 4;
          const pb = priorityMap[b.priority || 'B'] ?? 4;
          if (pa !== pb) return pa - pb;
        } else if (sortKey === 'due') {
          
          if (!a.due && b.due) return 1;
          if (a.due && !b.due) return -1;
          if (a.due && b.due) {
            return a.due.localeCompare(b.due);
          }
        }
        
        
        const ca = a.createdAt || a.id;
        const cb = b.createdAt || b.id;
        return cb - ca;
      });

      return result;
    }, [tasks, statusFilter, priorityFilter, searchQuery, sortKey]);

    
    const renderLockDots = () => {
      const items = [];
      for (let i = 0; i < 4; i++) {
        const isFilled = i < pinCode.length;
        const isErr = pinError;
        items.push(html`
          <div key=${i} class="tl-lock-dot ${isFilled ? 'filled' : ''} ${isErr ? 'error' : ''}"></div>
        `);
      }
      return items;
    };

    if (!unlocked) {
      
      return html`
        <div class="tl-lock-wrap">
          <div class="tl-lock-box">
            <div class="tl-lock-title">Mission Control Gate</div>
            <div class="tl-lock-dots">
              ${renderLockDots()}
            </div>
            <div class="tl-lock-grid">
              ${[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => html`
                <button key=${num} class="tl-lock-key" onClick=${() => handlePinPress(String(num))}>${num}</button>
              `)}
              <button class="tl-lock-key fn" onClick=${() => handlePinPress('clear')}>CLR</button>
              <button class="tl-lock-key" onClick=${() => handlePinPress('0')}>0</button>
              <button class="tl-lock-key fn" onClick=${() => handlePinPress('back')}>DEL</button>
            </div>
          </div>
          \x3C!-- Toast notification layer inside lock screen -->
          <div class="tl-toast-container">
            ${toasts.map(t => html`
              <div key=${t.id} class="tl-toast tl-toast-${t.type} ${t.show ? 'show' : ''}">
                ${t.msg}
              </div>
            `)}
          </div>
        </div>
      `;
    }

    
    return html`
      <div class="tl-container">
        \x3C!-- Header -->
        <header class="tl-header">
          <div class="tl-logo">
            <h1 class="tl-title">_MISSION_CONTROL</h1>
            <span class="tl-logo-sub">SYS: ACTIVE TASK LOGGER</span>
          </div>
          <div class="tl-header-actions">
            <button class="tl-btn tl-btn-outline tl-btn-sm" onClick=${() => window.history.back()}>◀ EXIT</button>
            <span class="tl-sync-indicator tl-sync-${syncStatus === 'busy' ? 'busy' : syncStatus === 'err' ? 'err' : blobId ? 'ok' : 'local'}">
              ${syncStatus === 'busy' ? '◌ SYNCING' : syncStatus === 'err' ? '✕ SYNC ERR' : blobId ? '◉ CLOUD' : '○ LOCAL'}
            </span>
            <button class="tl-btn tl-btn-outline tl-btn-sm" onClick=${() => syncCloud(false)} title="Force Synchronize">⟳ SYNC</button>
            <button class="tl-btn tl-btn-outline tl-btn-sm" onClick=${() => { setConfigBlobInput(blobId || ''); setIsConfigOpen(true); }} title="System Config">⚙ CONFIG</button>
            <button class="tl-btn tl-btn-default tl-btn-sm" onClick=${() => setIsAddOpen(true)}>+ DEPLOY</button>
          </div>
        </header>

        \x3C!-- Stats Dashboard -->
        <div class="tl-stats-grid">
          <div class="tl-stat-card">
            <span class="tl-stat-label">Pending</span>
            <span class="tl-stat-value tl-text-foreground">${stats.pending}</span>
          </div>
          <div class="tl-stat-card">
            <span class="tl-stat-label">Rank S/A</span>
            <span class="tl-stat-value tl-text-primary">${stats.priority}</span>
          </div>
          <div class="tl-stat-card">
            <span class="tl-stat-label">Soon / Overdue</span>
            <span class="tl-stat-value tl-text-warning">${stats.soon}</span>
          </div>
          <div class="tl-stat-card">
            <span class="tl-stat-label">Completed</span>
            <span class="tl-stat-value tl-text-success">${stats.completed}</span>
          </div>
        </div>

        \x3C!-- Toolbar controls -->
        <div class="tl-toolbar">
          <div class="tl-tabs-list">
            <button class="tl-tabs-trigger ${statusFilter === 'active' ? 'active' : ''}" onClick=${() => setStatusFilter('active')}>Active</button>
            <button class="tl-tabs-trigger ${statusFilter === 'completed' ? 'active' : ''}" onClick=${() => setStatusFilter('completed')}>Completed</button>
            <button class="tl-tabs-trigger ${statusFilter === 'all' ? 'active' : ''}" onClick=${() => setStatusFilter('all')}>All Objects</button>
          </div>

          <div class="tl-toolbar-right">
            \x3C!-- Search -->
            <div class="tl-search-wrap">
              <span class="tl-search-icon">🔍</span>
              <input 
                ref=${searchInputRef}
                type="text" 
                class="tl-input tl-search-input" 
                placeholder="Search Objectives (/) ..." 
                value=${searchQuery} 
                onChange=${e => setSearchQuery(e.target.value)}
              />
            </div>

            \x3C!-- Priority filter -->
            <select class="tl-select tl-w-100" value=${priorityFilter} onChange=${e => setPriorityFilter(e.target.value)}>
              <option value="all">All Ranks</option>
              <option value="S">Rank S</option>
              <option value="A">Rank A</option>
              <option value="B">Rank B</option>
              <option value="C">Rank C</option>
            </select>

            \x3C!-- Sorting -->
            <select class="tl-select tl-w-110" value=${sortKey} onChange=${e => setSortKey(e.target.value)}>
              <option value="priority">Priority Rank</option>
              <option value="due">Due Date</option>
              <option value="created">Created Date</option>
            </select>
          </div>
        </div>

        \x3C!-- Task List Items -->
        <div class="tl-list-container tl-mt-4">
          ${processedTasks.length === 0 ? html`
            <div class="tl-empty">
              <div class="tl-empty-icon">📂</div>
              <div class="tl-text-sm">NO DATA DETECTED IN MONITOR</div>
              <div class="tl-text-xs tl-text-muted tl-mt-1">Adjust search filters or click + DEPLOY to create an objective.</div>
            </div>
          ` : processedTasks.map(t => {
            const dueStatus = getDueStatus(t.due);
            return html`
              <div key=${t.id} class="tl-item tl-item-${(t.priority || 'B').toLowerCase()} ${t.done ? 'completed' : ''} tl-mb-2">
                \x3C!-- Checked toggle -->
                <div class="tl-check ${t.done ? 'checked' : ''}" onClick=${() => toggleTask(t.id)}>
                  ✓
                </div>
                
                <div class="tl-item-info">
                  <div class="tl-item-header">
                    <span class="tl-item-name">${t.task}</span>
                    <span class="tl-badge tl-badge-${(t.priority || 'B').toLowerCase()}">RANK ${t.priority || 'B'}</span>
                  </div>

                  ${t.due && html`
                    <div class="tl-item-due ${dueStatus.className}">
                      📅 ${dueStatus.label}
                    </div>
                  `}

                  ${t.note && html`
                    <div class="tl-item-memo">${t.note}</div>
                  `}
                </div>

                <div class="tl-item-actions">
                  <button class="tl-btn tl-btn-ghost tl-btn-icon sm" onClick=${() => setEditTask({ ...t })} title="Edit Task">✏️</button>
                  <button class="tl-btn tl-btn-ghost tl-btn-icon sm" style=${ { color: 'hsl(346.8, 77.2%, 49.8%)' } } onClick=${() => deleteTask(t.id)} title="Delete Task">✕</button>
                </div>
              </div>
            `;
          })}
        </div>

        \x3C!-- ADD TASK DIALOG (DEPLOY OVERLAY) -->
        <div class="tl-overlay ${isAddOpen ? 'open' : ''}">
          <div class="tl-dialog">
            <button class="tl-dialog-close" onClick=${() => setIsAddOpen(false)}>✕</button>
            <div class="tl-dialog-header">
              <h2 class="tl-dialog-title">Deploy New Objective</h2>
              <p class="tl-dialog-description">Deploy a new task object to the system log.</p>
            </div>
            
            <form onSubmit=${handleCreateTask}>
              <div class="tl-dialog-body">
                <div class="cn-field tl-mb-4">
                  <label class="tl-label">Objective Description</label>
                  <input 
                    type="text" 
                    className="tl-input" 
                    placeholder="Enter objective task..." 
                    required 
                    value=${newObj} 
                    onChange=${e => setNewObj(e.target.value)}
                  />
                </div>

                <div class="tl-field-row tl-mb-4">
                  <div>
                    <label class="tl-label">Deadline / Due Info</label>
                    <input 
                      type="text" 
                      className="tl-input" 
                      placeholder="e.g. 12月31日" 
                      value=${newDue} 
                      onChange=${e => setNewDue(e.target.value)}
                    />
                  </div>
                  <div>
                    <label class="tl-label">Priority Rank</label>
                    <select className="tl-select" value=${newPri} onChange=${e => setNewPri(e.target.value)}>
                      <option value="S">S (Critical)</option>
                      <option value="A">A (High)</option>
                      <option value="B">B (Medium)</option>
                      <option value="C">C (Low)</option>
                    </select>
                  </div>
                </div>

                <div class="cn-field">
                  <label class="tl-label">Notes & Guidelines</label>
                  <textarea 
                    className="tl-textarea" 
                    placeholder="Add descriptive guides or subtasks..." 
                    value=${newNote} 
                    onChange=${e => setNewNote(e.target.value)}
                  />
                </div>
              </div>
              
              <div class="tl-dialog-footer">
                <button type="button" class="tl-btn tl-btn-outline" onClick=${() => setIsAddOpen(false)}>Cancel</button>
                <button type="submit" class="tl-btn tl-btn-default">Deploy</button>
              </div>
            </form>
          </div>
        </div>

        \x3C!-- EDIT TASK DIALOG -->
        <div class="tl-overlay ${editTask ? 'open' : ''}">
          ${editTask && html`
            <div class="tl-dialog">
              <button class="tl-dialog-close" onClick=${() => setEditTask(null)}>✕</button>
              <div class="tl-dialog-header">
                <h2 class="tl-dialog-title">Modify Objective</h2>
                <p class="tl-dialog-description">Modify task metadata parameters.</p>
              </div>
              
              <form onSubmit=${handleSaveEdit}>
                <div class="tl-dialog-body">
                  <div class="cn-field tl-mb-4">
                    <label class="tl-label">Objective Description</label>
                    <input 
                      type="text" 
                      className="tl-input" 
                      required 
                      value=${editTask.task} 
                      onChange=${e => setEditTask({ ...editTask, task: e.target.value })}
                    />
                  </div>

                  <div class="tl-field-row tl-mb-4">
                    <div>
                      <label class="tl-label">Deadline / Due Info</label>
                      <input 
                        type="text" 
                        className="tl-input" 
                        value=${editTask.due} 
                        onChange=${e => setEditTask({ ...editTask, due: e.target.value })}
                      />
                    </div>
                    <div>
                      <label class="tl-label">Priority Rank</label>
                      <select className="tl-select" value=${editTask.priority} onChange=${e => setEditTask({ ...editTask, priority: e.target.value })}>
                        <option value="S">S (Critical)</option>
                        <option value="A">A (High)</option>
                        <option value="B">B (Medium)</option>
                        <option value="C">C (Low)</option>
                      </select>
                    </div>
                  </div>

                  <div class="cn-field">
                    <label class="tl-label">Notes & Guidelines</label>
                    <textarea 
                      className="tl-textarea" 
                      value=${editTask.note} 
                      onChange=${e => setEditTask({ ...editTask, note: e.target.value })}
                    />
                  </div>
                </div>
                
                <div class="tl-dialog-footer">
                  <button type="button" class="tl-btn tl-btn-outline" onClick=${() => setEditTask(null)}>Cancel</button>
                  <button type="submit" class="tl-btn tl-btn-default">Save Changes</button>
                </div>
              </form>
            </div>
          `}
        </div>

        \x3C!-- CONFIG / SETTINGS DIALOG -->
        <div class="tl-overlay ${isConfigOpen ? 'open' : ''}">
          <div class="tl-dialog">
            <button class="tl-dialog-close" onClick=${() => setIsConfigOpen(false)}>✕</button>
            <div class="tl-dialog-header">
              <h2 class="tl-dialog-title">System Configuration</h2>
              <p class="tl-dialog-description">Cloud sync, imports, exports, and settings.</p>
            </div>

            <div class="tl-dialog-body">
              \x3C!-- Sync Segment -->
              <h3 class="tl-font-semibold tl-text-sm tl-mb-1">Cloud Sync Synchronization</h3>
              <p class="tl-text-xs tl-text-muted tl-mb-3">
                Share tasks with multiple devices. Your Blob ID is automatically created on first sync. Apply it on another device to restore.
              </p>
              
              <div class="tl-label tl-fs-sm">Active Sync Blob ID</div>
              <div class="tl-mono tl-text-xs tl-config-blob">
                ${blobId || 'Local Storage Only (No Active Blob)'}
              </div>

              <div class="cn-field tl-mb-6">
                <label class="tl-label">Apply Existing Blob ID</label>
                <input 
                  type="text" 
                  className="tl-input" 
                  placeholder="Paste external Blob ID here..." 
                  value=${configBlobInput}
                  onChange=${e => setConfigBlobInput(e.target.value)}
                />
              </div>

              <div class="tl-separator"></div>

              \x3C!-- Data Management -->
              <h3 class="tl-font-semibold tl-text-sm tl-mb-3">Backup & Recovery</h3>
              <div class="tl-flex-wrap-gap">
                <button class="tl-btn tl-btn-outline" onClick=${handleExport}>📤 EXPORT DATA</button>
                <label class="tl-btn tl-btn-outline" style=${ { cursor: 'pointer' } }>
                  📥 IMPORT DATA
                  <input type="file" accept=".json" style=${ { display: 'none' } } onChange=${handleImport} />
                </label>
              </div>

              <div class="tl-separator"></div>

              \x3C!-- Destructive wipe -->
              <h3 class="tl-font-semibold tl-text-sm tl-danger-title">Danger Zone</h3>
              <p class="tl-text-xs tl-text-muted tl-mb-3">
                Completely erase all objectives database on this browser session.
              </p>
              <button class="tl-btn tl-btn-danger" onClick=${handleWipeAll}>WIPE DATABASE</button>
            </div>

            <div class="tl-dialog-footer">
              <button class="tl-btn tl-btn-outline" onClick=${() => setIsConfigOpen(false)}>Cancel</button>
              <button class="tl-btn tl-btn-default" onClick=${handleApplyConfig}>Apply Changes</button>
            </div>
          </div>
        </div>

        \x3C!-- Toast Notification Layer -->
        <div class="tl-toast-container">
          ${toasts.map(t => html`
            <div key=${t.id} class="tl-toast tl-toast-${t.type} ${t.show ? 'show' : ''}">
              ${t.type === 'success' ? '◉' : t.type === 'error' ? '✕' : 'ℹ'} ${t.msg}
            </div>
          `)}
        </div>
      </div>
    `;
  }

  
  const container = document.getElementById('tl-app-mount');
  const root = ReactDOM.createRoot(container);
  root.render(React.createElement(App));
})();
</script>
