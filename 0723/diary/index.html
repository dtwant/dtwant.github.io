<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Secret Diary</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #09090b;
      overflow: hidden;
    }
  </style>
</head>
<body>
  
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=SF+Pro+Text:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


<div id="sd-lock-screen" class="sd-lock-screen sd-hidden">
  <div class="sd-lock-container">
    <div class="sd-lock-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 class="sd-lock-title">パスコードを入力</h1>
    <div class="sd-pin-dots" id="sd-pin-dots">
      <div class="sd-pin-dot"></div>
      <div class="sd-pin-dot"></div>
      <div class="sd-pin-dot"></div>
      <div class="sd-pin-dot"></div>
    </div>
    <div class="sd-keypad">
      <button class="sd-key-btn" data-val="1">1</button>
      <button class="sd-key-btn" data-val="2">2</button>
      <button class="sd-key-btn" data-val="3">3</button>
      <button class="sd-key-btn" data-val="4">4</button>
      <button class="sd-key-btn" data-val="5">5</button>
      <button class="sd-key-btn" data-val="6">6</button>
      <button class="sd-key-btn" data-val="7">7</button>
      <button class="sd-key-btn" data-val="8">8</button>
      <button class="sd-key-btn" data-val="9">9</button>
      <button class="sd-key-btn sd-empty-key"></button>
      <button class="sd-key-btn" data-val="0">0</button>
      <button class="sd-key-btn sd-delete-key" id="sd-pin-delete">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
    </div>
  </div>
</div>

<div id="secret-diary-overlay" class="sd-overlay sd-hidden">
  <div class="sd-app">
    
    <header class="sd-header">
      <div class="sd-header-left">
        <button class="sd-back-btn" id="sd-close-btn" aria-label="Close diary">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="sd-header-title">
          <span class="sd-title-text" id="sd-header-title-text">日記</span>
          <span class="sd-entry-count" id="sd-entry-count">0 件</span>
        </div>
      </div>
      <div class="sd-header-actions" id="sd-header-actions-timeline">
        <button class="sd-icon-btn" id="sd-search-toggle" aria-label="Search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </button>
        <button class="sd-icon-btn" id="sd-fav-filter-toggle" aria-label="Filter Favorites">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </button>
      </div>
    </header>

    
    <div class="sd-search-bar sd-hidden" id="sd-search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="text" class="sd-search-input" id="sd-search-input" placeholder="本文、タグで検索..." autocomplete="off" />
    </div>

    
    <div class="sd-tabs-container">
      
      
      <div class="sd-tab-content sd-active" id="sd-tab-timeline">
        
        <div class="sd-tag-cloud" id="sd-tag-cloud"></div>
        <div class="sd-feed" id="sd-feed">
          <div class="sd-empty-state" id="sd-empty-state">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.25; color:var(--apple-blue);"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
            <p class="sd-empty-title">日記がありません</p>
          </div>
        </div>
      </div>

      
      <div class="sd-tab-content" id="sd-tab-calendar">
        <div class="sd-calendar-view">
          <div class="sd-calendar-header">
            <button class="sd-cal-nav" id="sd-cal-prev"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
            <span class="sd-calendar-title" id="sd-cal-month-year">2026年6月</span>
            <button class="sd-cal-nav" id="sd-cal-next"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg></button>
          </div>
          <div class="sd-calendar-weekdays">
            <span>日</span><span>月</span><span>火</span><span>水</span><span>木</span><span>金</span><span>土</span>
          </div>
          <div class="sd-calendar-days" id="sd-calendar-days"></div>
        </div>
        <div class="sd-calendar-focused-section">
          <h3 class="sd-section-title" id="sd-calendar-focused-date-label">6月9日</h3>
          <div id="sd-calendar-focused-list"></div>
          <button class="sd-apple-btn sd-primary-btn" id="sd-calendar-add-btn" style="margin-top: 12px; width:100%;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            この日の日記を書く
          </button>
        </div>
      </div>

      
      <div class="sd-tab-content" id="sd-tab-gaman">
        <div class="sd-gaman-container" id="sd-gaman-container">
          <button class="sd-gaman-btn" id="sd-gaman-trigger">我慢</button>
          <div class="sd-gaman-counter-box">
            我慢した回数: <span id="sd-gaman-count-val">0</span> 回
          </div>
          <div style="display: flex; gap: 12px; margin-top: 30px;">
            <button class="sd-apple-btn sd-secondary-btn" id="sd-gaman-history-btn" style="padding: 10px 16px;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="margin-right:4px;"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg>
              履歴
            </button>
            <button class="sd-gaman-reset-btn" id="sd-gaman-reset" style="margin: 0; padding: 10px 14px;">リセット</button>
          </div>
        </div>
      </div>

      
      <div class="sd-tab-content" id="sd-tab-stats">
        <div class="sd-stats-scroll">
          <div class="sd-stats-card">
            <h3 class="sd-stats-card-title">気分の割合</h3>
            <div class="sd-chart-box">
              <svg class="sd-pie-chart" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" fill="transparent" stroke="#27272a" stroke-width="12"/>
                <circle id="sd-chart-pie-accent" cx="50" cy="50" r="40" fill="transparent" stroke="var(--apple-blue)" stroke-width="12" stroke-dasharray="251.2" stroke-dashoffset="251.2"/>
              </svg>
              <div class="sd-chart-legend" id="sd-chart-legend"></div>
            </div>
          </div>
          
          <div class="sd-stats-card">
            <h3 class="sd-stats-card-title">よく使うタグ</h3>
            <div class="sd-tag-stats-list" id="sd-tag-stats-list"></div>
          </div>

          <div class="sd-stats-card">
            <h3 class="sd-stats-card-title">継続日数</h3>
            <div class="sd-streak-container">
              <div class="sd-streak-val" id="sd-stat-streak">0</div>
              <div class="sd-streak-label">連続投稿日数</div>
            </div>
            <div class="sd-streak-sub" id="sd-stat-total">総日記数: 0 件</div>
          </div>
        </div>
      </div>

      
      <div class="sd-tab-content" id="sd-tab-settings">
        <div class="sd-settings-list">
          <div class="sd-settings-section">
            <div class="sd-setting-item">
              <div class="sd-setting-info">
                <span class="sd-setting-title">パスコードロック</span>
              </div>
              <label class="sd-switch">
                <input type="checkbox" id="sd-setting-lock-toggle">
                <span class="sd-slider"></span>
              </label>
            </div>
            <div class="sd-setting-item sd-hidden" id="sd-setting-change-pin-row">
              <button class="sd-text-btn" id="sd-setting-change-pin">パスコードを変更</button>
            </div>
          </div>

          <div class="sd-settings-section">
            <h4 class="sd-settings-sec-title">我慢データの他ブラウザ同期</h4>
            <div style="display: flex; flex-direction: column; gap: 8px; padding: 8px 0 12px;">
              <span class="sd-setting-desc" style="color:var(--apple-text-secondary); font-size:12px;">別ブラウザで同じ数値を同期するための共有用キーです。</span>
              <div style="display: flex; gap: 8px; margin-top: 6px;">
                <input type="text" id="sd-gaman-sync-key-input" class="sd-simple-input" style="background:rgba(255,255,255,0.05); border:1px solid var(--apple-border); padding:8px 12px; border-radius:8px;" placeholder="同期キーを入力" />
                <button class="sd-apple-btn sd-primary-btn" id="sd-gaman-sync-save-btn" style="padding:0 16px; font-size:13px; flex-shrink:0;">接続</button>
              </div>
              <div id="sd-gaman-sync-status" style="font-size:12px; color:var(--apple-text-secondary); margin-top:4px;">同期キー: 未接続</div>
            </div>
          </div>

          <div class="sd-settings-section">
            <h4 class="sd-settings-sec-title">データ管理</h4>
            <div class="sd-setting-action-row">
              <button class="sd-apple-btn sd-secondary-btn" id="sd-action-export">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                エクスポート (JSON)
              </button>
              <button class="sd-apple-btn sd-secondary-btn" id="sd-action-import-trigger">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                インポート (JSON)
              </button>
              <input type="file" id="sd-import-file" accept=".json" style="display:none;" />
            </div>
          </div>

          <div class="sd-settings-section">
            <h4 class="sd-settings-sec-title">データ削除</h4>
            <button class="sd-apple-btn sd-danger-btn" id="sd-action-clear-all" style="width: 100%;">
              すべてのデータを完全に削除
            </button>
          </div>
        </div>
      </div>

    </div>

    
    <nav class="sd-tabbar">
      <button class="sd-tab-btn sd-active" data-tab="timeline">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        <span>日記</span>
      </button>
      <button class="sd-tab-btn" data-tab="calendar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span>カレンダー</span>
      </button>
      <button class="sd-tab-btn" data-tab="gaman">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span>我慢</span>
      </button>
      <button class="sd-tab-btn" data-tab="stats">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span>統計</span>
      </button>
      <button class="sd-tab-btn" data-tab="settings">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>設定</span>
      </button>
    </nav>

    
    <button class="sd-fab" id="sd-fab" aria-label="Write new entry">+</button>
  </div>
</div>


<div class="sd-modal-overlay sd-hidden" id="sd-gaman-history-modal" style="z-index: 250000;">
  <div class="sd-modal" style="max-height: 80%; display: flex; flex-direction: column;">
    <div class="sd-modal-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--apple-border); padding-bottom:8px;">
      <span class="sd-modal-title">我慢の履歴</span>
      <button class="sd-icon-btn" id="sd-gaman-history-close" style="width:28px; height:28px; border-radius:50%;">×</button>
    </div>
    <div style="flex: 1; overflow-y: auto; margin: 16px 0; max-height: 300px;" id="sd-gaman-history-list"></div>
  </div>
</div>


<div class="sd-sheet-overlay sd-hidden" id="sd-compose-sheet">
  <div class="sd-sheet">
    <div class="sd-sheet-header">
      <button class="sd-sheet-close" id="sd-compose-cancel">キャンセル</button>
      <span class="sd-sheet-title" id="sd-compose-sheet-title">新規作成</span>
      <button class="sd-sheet-done" id="sd-compose-save" disabled>保存</button>
    </div>
    
    <div class="sd-sheet-body">
      
      <div class="sd-sheet-row sd-datetime-picker-row">
        <label for="sd-input-date">日時</label>
        <input type="datetime-local" id="sd-input-date" class="sd-datetime-input" />
      </div>

      
      <div class="sd-sheet-row">
        <input type="text" id="sd-input-tags" class="sd-simple-input" placeholder="タグを追加 (例: #アイデア #旅行)" autocomplete="off" />
      </div>

      
      <div class="sd-compose-mood" id="sd-compose-mood">
        <button class="sd-compose-mood-btn sd-active" data-mood="📝">📝</button>
        <button class="sd-compose-mood-btn" data-mood="😊">😊</button>
        <button class="sd-compose-mood-btn" data-mood="😐">😐</button>
        <button class="sd-compose-mood-btn" data-mood="😔">😔</button>
        <button class="sd-compose-mood-btn" data-mood="🔥">🔥</button>
        <button class="sd-compose-mood-btn" data-mood="💡">💡</button>
      </div>

      
      <div class="sd-editor-toolbar">
        <button class="sd-editor-tool" data-wrap="**" title="太字"><strong>B</strong></button>
        <button class="sd-editor-tool" data-wrap="*" title="斜体"><em>I</em></button>
        <button class="sd-editor-tool" data-wrap="-" title="リスト">リスト</button>
        <button class="sd-editor-tool" data-wrap="`" title="コード">コード</button>
      </div>

      <textarea class="sd-textarea" id="sd-textarea" placeholder="ここに日記を書く..." rows="8"></textarea>
      
      
      <div class="sd-media-picker-area">
        <div class="sd-attachment-header">
          <span>写真</span>
          <button class="sd-attachment-add-btn" id="sd-attachment-trigger">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            写真を追加
          </button>
          <input type="file" id="sd-media-input" accept="image/*" multiple style="display:none;" />
        </div>
        <div class="sd-media-grid" id="sd-compose-media-preview"></div>
      </div>
    </div>
  </div>
</div>


<div class="sd-modal-overlay sd-hidden" id="sd-pin-setup-modal">
  <div class="sd-modal">
    <div class="sd-modal-header">
      <span class="sd-modal-title">パスコード設定</span>
    </div>
    <div style="display: flex; flex-direction: column; gap: 12px; margin: 16px 0;">
      <p class="sd-modal-body-text">4桁 of パスコードを入力してください。</p>
      <input type="password" id="sd-pin-setup-input1" class="sd-modal-pin-input" maxlength="4" placeholder="パスコードを入力" pattern="[0-9]*" inputmode="numeric" />
      <input type="password" id="sd-pin-setup-input2" class="sd-modal-pin-input" maxlength="4" placeholder="もう一度入力" pattern="[0-9]*" inputmode="numeric" />
    </div>
    <div class="sd-modal-actions">
      <button class="sd-modal-btn sd-modal-cancel" id="sd-pin-setup-cancel">キャンセル</button>
      <button class="sd-modal-btn sd-modal-save" id="sd-pin-setup-save">設定する</button>
    </div>
  </div>
</div>

<style>
 

:root {
  --apple-bg: #000000;
  --apple-card-bg: rgba(22, 22, 26, 0.72);
  --apple-sheet-bg: #121217;
  --apple-border: rgba(255, 255, 255, 0.08);
  --apple-text-primary: #ffffff;
  --apple-text-secondary: #8e8e93;
  --apple-text-tertiary: #48484a;
  
  --apple-blue: #007aff;
  --apple-green: #34c759;
  --apple-purple: #af52de;
  --apple-orange: #ff9500;
  --apple-red: #ff3b30;
}

.sd-overlay {
  position: fixed;
  inset: 0;
  z-index: 90000;
  background: var(--apple-bg);
  display: flex;
  flex-direction: column;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
  color: var(--apple-text-primary);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
}
.sd-overlay.sd-hidden { display: none; }

.sd-app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 760px;
  width: 100%;
  margin: 0 auto;
  position: relative;
  background: #09090b;
}

 
.sd-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  background: rgba(9, 9, 11, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--apple-border);
  flex-shrink: 0;
  min-height: 60px;
  z-index: 10;
  position: sticky;
  top: 0;
}
.sd-header-left {
  display: flex;
  align-items: center;
  gap: 14px;
}
.sd-back-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.05);
  color: var(--apple-text-primary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  -webkit-tap-highlight-color: transparent;
}
.sd-back-btn:hover { background: rgba(255, 255, 255, 0.12); }
.sd-back-btn:active { transform: scale(0.92); }

.sd-header-title { display: flex; flex-direction: column; }
.sd-title-text {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.sd-entry-count {
  font-size: 12px;
  color: var(--apple-text-secondary);
}
.sd-header-actions {
  display: flex;
  gap: 6px;
}
.sd-icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: none;
  background: rgba(255, 255, 255, 0.05);
  color: var(--apple-text-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.2s;
  -webkit-tap-highlight-color: transparent;
}

  function initDB(callback) {
    var request = indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = function(e) {
      var database = e.target.result;
      if (!database.objectStoreNames.contains(STORE_NAME)) {
        database.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
      if (!database.objectStoreNames.contains('settings')) {
        database.createObjectStore('settings', { keyPath: 'key' });
      }
    };
    request.onsuccess = function(e) {
      db = e.target.result;
      migrateFromLocalStorage(callback);
    };
    request.onerror = function(e) {
      console.error('IndexedDB open error:', e);
      if (callback) callback();
    };
  }

  function dbGetSetting(key, callback) {
    if (!db) { callback(null); return; }
    try {
      var transaction = db.transaction(['settings'], 'readonly');
      var store = transaction.objectStore('settings');
      var request = store.get(key);
      request.onsuccess = function(e) {
        callback(e.target.result ? e.target.result.value : null);
      };
      request.onerror = function() {
        callback(null);
      };
    } catch(err) {
      callback(null);
    }
  }

  function dbPutSetting(key, value, callback) {
    if (!db) { if (callback) callback(); return; }
    try {
      var transaction = db.transaction(['settings'], 'readwrite');
      var store = transaction.objectStore('settings');
      var request = store.put({ key: key, value: value });
      request.onsuccess = function() {
        if (callback) callback(true);
      };
      request.onerror = function() {
        if (callback) callback(false);
      };
    } catch(err) {
      if (callback) callback(false);
    }
  }

  
  function migrateFromLocalStorage(callback) {
    try {
      var legacyData = localStorage.getItem('dt_secret_diary_entries');
      if (legacyData) {
        var parsed = JSON.parse(legacyData);
        if (Array.isArray(parsed) && parsed.length > 0) {
          var transaction = db.transaction([STORE_NAME], 'readwrite');
          var store = transaction.objectStore(STORE_NAME);
          parsed.forEach(function(entry) {
            var cleanEntry = {
              id: entry.id || (Date.now().toString(36) + Math.random().toString(36).substr(2, 5)),
              text: entry.text || '',
              mood: entry.mood || '📝',
              ts: entry.ts || Date.now(),
              images: entry.images || [],
              favorite: entry.favorite || false,
              tags: entry.tags || []
            };
            store.put(cleanEntry);
          });
          transaction.oncomplete = function() {
            localStorage.removeItem('dt_secret_diary_entries');
            if (callback) callback();
          };
          transaction.onerror = function() {
            if (callback) callback();
          };
        } else {
          if (callback) callback();
        }
      } else {
        if (callback) callback();
      }
    } catch(err) {
      console.error('Migration failed:', err);
      if (callback) callback();
    }
  }

  function dbGetAll(callback) {
    if (!db) { callback([]); return; }
    var transaction = db.transaction([STORE_NAME], 'readonly');
    var store = transaction.objectStore(STORE_NAME);
    var request = store.getAll();
    request.onsuccess = function(e) {
      callback(e.target.result || []);
    };
    request.onerror = function() {
      callback([]);
    };
  }

  function dbPut(entry, callback) {
    if (!db) { if (callback) callback(); return; }
    var transaction = db.transaction([STORE_NAME], 'readwrite');
    var store = transaction.objectStore(STORE_NAME);
    var request = store.put(entry);

      if (callback) callback(true);
    };

  function triggerConfetti() {
    var canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;inset:0;width:100vw;height:100vh;pointer-events:none;z-index:500000;';
    document.body.appendChild(canvas);
    
    var ctx = canvas.getContext('2d');
    var dpr = window.devicePixelRatio || 1;
    
    function resizeCanvas() {
      canvas.width = window.innerWidth * dpr;
      canvas.height = window.innerHeight * dpr;
      ctx.scale(dpr, dpr);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);
    
    var particles = [];
    var colors = [
      '#ff2d55', 
      '#ff9500', 
      '#ffcc00', 
      '#34c759', 
      '#007aff', 
      '#af52de', 
      '#5ac8fa', 
      '#ff5e3a', 
      '#ffdb4c'  
    ];
    
    function createConfetti(side) {
      var startX = side === 'left' ? 40 : window.innerWidth - 40;
      var startY = window.innerHeight + 10;
      
      
      for (var i = 0; i < 160; i++) {
        var angle = side === 'left'
          ? (Math.random() * 30 + 40) * Math.PI / 180
          : (Math.random() * 30 + 110) * Math.PI / 180;
        
        var speed = Math.random() * 22 + 12; 
        
        var shapes = ['rect', 'circle', 'triangle', 'ribbon'];
        var shape = shapes[Math.floor(Math.random() * shapes.length)];
        
        particles.push({
          type: 'confetti',
          shape: shape,
          x: startX,
          y: startY,
          vx: Math.cos(angle) * speed,
          vy: -Math.sin(angle) * speed,
          color: colors[Math.floor(Math.random() * colors.length)],
          width: shape === 'ribbon' ? Math.random() * 3 + 3 : Math.random() * 6 + 6,
          height: shape === 'ribbon' ? Math.random() * 15 + 15 : Math.random() * 7 + 7,
          rotation: Math.random() * Math.PI * 2,
          rotationSpeed: (Math.random() - 0.5) * 0.1,
          wobble: Math.random() * Math.PI * 2,
          wobbleSpeed: Math.random() * 0.08 + 0.04,
          wobbleDistance: Math.random() * 4 + 2,
          opacity: 1,
          decay: Math.random() * 0.005 + 0.003, 
          gravity: Math.random() * 0.12 + 0.22,  
          drag: 0.982 + Math.random() * 0.008   
        });
      }
      
      
      for (var j = 0; j < 50; j++) {
        var angle = side === 'left'
          ? (Math.random() * 45 + 30) * Math.PI / 180
          : (Math.random() * 45 + 105) * Math.PI / 180;
          
        var speed = Math.random() * 28 + 10;
        
        particles.push({
          type: 'spark',
          x: startX,
          y: startY - 10,
          vx: Math.cos(angle) * speed,
          vy: -Math.sin(angle) * speed,
          color: Math.random() > 0.4 ? '#ffffff' : '#ffcc00',
          radius: Math.random() * 3 + 1.5,
          opacity: 1,
          decay: Math.random() * 0.03 + 0.02,
          gravity: 0.15,
          drag: 0.94
        });
      }
    }
    
    createConfetti('left');
    createConfetti('right');
    
    function loop() {
      if (particles.length === 0) {
        window.removeEventListener('resize', resizeCanvas);
        canvas.remove();
        return;
      }
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (var i = particles.length - 1; i >= 0; i--) {
        var p = particles[i];
        
        p.x += p.vx;
        p.y += p.vy;
        p.vy += p.gravity;
        p.vx *= p.drag;
        p.vy *= p.drag;
        p.opacity -= p.decay;
        
        if (p.opacity <= 0 || p.y > window.innerHeight + 50 || p.x < -50 || p.x > window.innerWidth + 50) {
          particles.splice(i, 1);
          continue;
        }
        
        if (p.type === 'confetti') {
          p.rotation += p.rotationSpeed;
          p.wobble += p.wobbleSpeed;
          
          var drift = Math.sin(p.wobble) * p.wobbleDistance;
          
          ctx.save();
          ctx.translate(p.x + drift, p.y);
          ctx.rotate(p.rotation);
          
          var scaleX = Math.sin(p.wobble);
          ctx.scale(scaleX, 1);
          
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          
          if (p.shape === 'circle') {
            ctx.beginPath();
            ctx.arc(0, 0, p.width / 2, 0, Math.PI * 2);
            ctx.fill();
          } else if (p.shape === 'triangle') {
            ctx.beginPath();
            ctx.moveTo(0, -p.height / 2);
            ctx.lineTo(p.width / 2, p.height / 2);
            ctx.lineTo(-p.width / 2, p.height / 2);
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);
          }
          
          ctx.restore();
        } else if (p.type === 'spark') {
          ctx.save();
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.globalAlpha = p.opacity;
          ctx.fillStyle = p.color;
          ctx.shadowBlur = 10;
          ctx.shadowColor = p.color;
          ctx.fill();
          ctx.restore();
        }
      }
      
      requestAnimationFrame(loop);
    }
    
    requestAnimationFrame(loop);
  }

  function initSyncKey() {
    dbGetSetting('sd_gaman_sync_key', function(dbKey) {
      dbGetSetting('sd_gaman_data', function(dbData) {
        var localKey = localStorage.getItem('sd_gaman_sync_key');
        var localDataStr = localStorage.getItem('sd_gaman_data');
        var localData = null;
        try {
          localData = localDataStr ? JSON.parse(localDataStr) : null;
        } catch(e) {}

        
        if (!localKey && dbKey) {
          localStorage.setItem('sd_gaman_sync_key', dbKey);
          localKey = dbKey;
        } else if (localKey && !dbKey) {
          dbPutSetting('sd_gaman_sync_key', localKey);
        }

        
        if (dbData) {
          if (!localData || (dbData.total > localData.total)) {
            localStorage.setItem('sd_gaman_data', JSON.stringify(dbData));
            localData = dbData;
          }
        }
        if (localData && !dbData) {
          dbPutSetting('sd_gaman_data', localData);
        }

        
        if (!localKey) {
          fetch('https://api.keyvalue.xyz/new/gaman_data', {
            method: 'POST'
          })
          .then(function(res) { return res.text(); })
          .then(function(url) {
            var parts = url.trim().split('/');
            var userKey = parts[3];
            if (userKey) {
              localStorage.setItem('sd_gaman_sync_key', userKey);
              dbPutSetting('sd_gaman_sync_key', userKey);
              updateSyncStatusUI(userKey, true);
              var currentData = getGamanData();
              syncWithCloud(currentData);
            }
          })
          .catch(function(e) { console.error('Key generation failed:', e); });
        } else {
          updateSyncStatusUI(localKey, true);
          pullFromCloud();
        }
      });
    });
  }

  function updateSyncStatusUI(key, isConnected) {
    gamanSyncKeyInput.value = key || '';
    if (isConnected && key) {
      gamanSyncKeyInput.readOnly = true;
      gamanSyncKeyInput.style.background = 'rgba(255,255,255,0.02)';

      gamanSyncSaveBtn.textContent = '同期解除';
      gamanSyncSaveBtn.className = 'sd-apple-btn sd-danger-btn';
      gamanSyncStatus.textContent = '同期キー: ' + key + ' (同期中 - 編集不可ロック)';

    fetch(url, {

      body: JSON.stringify(data)
    }).catch(function(e) { console.error('Sync failed:', e); });

  function pullFromCloud() {
    var key = localStorage.getItem('sd_gaman_sync_key');
    if (!key) return;
    
    var url = 'https://api.keyvalue.xyz/' + key + '/gaman_data';
    fetch(url)
    .then(function(res) {
      if (res.status === 200) return res.json();
      return null;
    })
    .then(function(cloudData) {
      if (cloudData && typeof cloudData.total === 'number') {
        var localData = getGamanData();
        if (cloudData.total > localData.total) {
          localStorage.setItem('sd_gaman_data', JSON.stringify(cloudData));
          dbPutSetting('sd_gaman_data', cloudData);
          if (currentTab === 'gaman') renderGaman();
        }
      }
    })
    .catch(function(e) { console.error('Sync pull failed:', e); });
  }

  function connectToSyncKey() {
    var key = gamanSyncKeyInput.value.trim();
    if (key.length < 5) {
      alert('無効な同期キーです。');
      return;
    }
    
    var url = 'https://api.keyvalue.xyz/' + key + '/gaman_data';
    fetch(url)
    .then(function(res) {
      if (res.status === 200) return res.json();
      throw new Error('Key not found');
    })
    .then(function(cloudData) {
      if (cloudData && typeof cloudData.total === 'number') {
        localStorage.setItem('sd_gaman_sync_key', key);
        localStorage.setItem('sd_gaman_data', JSON.stringify(cloudData));
        dbPutSetting('sd_gaman_sync_key', key);
        dbPutSetting('sd_gaman_data', cloudData);
        updateSyncStatusUI(key, true);
        renderGaman();
        alert('同期が完了しました！');

  function extractTags(text) {
    var regex = /#([a-zA-Z0-9ぁ-んァ-ヶー一-龠]+)/g;
    var matches = [];
    var match;
    while ((match = regex.exec(text)) !== null) {
      matches.push(match[1]);
    }
    return matches;
  }

  
  function parseSimpleMarkdown(text) {
    var escaped = text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');

    escaped = escaped.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    escaped = escaped.replace(/\*(.*?)\*/g, '<em>$1</em>');
    escaped = escaped.replace(/`(.*?)`/g, '<code class="sd-inline-code">$1</code>');
    
    escaped = escaped.replace(/#([a-zA-Z0-9\u3040-\u309F\u30A0-\u30FF\u4E00-\u9FAF]+)/g, '<span class="sd-card-tag">#$1</span>');

    var lines = escaped.split('\n');
    var parsedLines = lines.map(function(line) {
      if (line.trim().indexOf('- ') === 0) {
        return '<li>' + line.trim().substring(2) + '</li>';
      }
      return line;
    });
    escaped = parsedLines.join('\n');
    escaped = escaped.replace(/(<li>.*?<\/li>)+/g, '<ul>$&</ul>');
    
    return escaped.replace(/\n/g, '<br>');
  }

  function getDaysInMonth(year, month) {
    return new Date(year, month + 1, 0).getDate();

  function renderCalendarDays() {
    dbGetAll(function(entries) {
      calDaysContainer.innerHTML = '';
      
      var year = calendarDate.getFullYear();
      var month = calendarDate.getMonth();
      
      calMonthYear.textContent = year + '年' + (month + 1) + '月';

      var dateMap = {};
      entries.forEach(function(e) {
        var d = new Date(e.ts);
        var key = d.getFullYear() + '-' + d.getMonth() + '-' + d.getDate();
        dateMap[key] = (dateMap[key] || 0) + 1;
      });

      var firstDayIndex = new Date(year, month, 1).getDay();
      var prevMonthDays = getDaysInMonth(year, month - 1);
      
      for (var i = firstDayIndex - 1; i >= 0; i--) {
        var dayNum = prevMonthDays - i;
        var dayEl = createDayCell(dayNum, true, year, month - 1, dateMap);
        calDaysContainer.appendChild(dayEl);
      }

      var currentMonthDays = getDaysInMonth(year, month);
      for (var j = 1; j <= currentMonthDays; j++) {
        var dayEl = createDayCell(j, false, year, month, dateMap);
        calDaysContainer.appendChild(dayEl);
      }

      var totalCellsUsed = firstDayIndex + currentMonthDays;
      var remainingCells = 42 - totalCellsUsed;
      for (var k = 1; k <= remainingCells; k++) {
        var dayEl = createDayCell(k, true, year, month + 1, dateMap);
        calDaysContainer.appendChild(dayEl);
      }
    });
  }

    if (dateMap[key]) {

  function calculateStreak(entries) {
    if (entries.length === 0) {
      document.getElementById('sd-stat-streak').textContent = '0';
      return;
    }
    
    var dates = entries.map(function(e) {
      var d = new Date(e.ts);
      return d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
    });
    
    var uniqueDates = Array.from(new Set(dates)).map(function(dStr) {
      return new Date(dStr);
    }).sort(function(a,b) { return b - a; });

    var currentStreak = 0;
    var today = new Date();
    var checkDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    
    var newestEntryDate = uniqueDates[0];
    if (!newestEntryDate) {
      document.getElementById('sd-stat-streak').textContent = '0';
      return;
    }
    var diffTime = checkDate - new Date(newestEntryDate.getFullYear(), newestEntryDate.getMonth(), newestEntryDate.getDate());
    var diffDays = diffTime / (1000 * 60 * 60 * 24);

    if (diffDays > 1) {
      document.getElementById('sd-stat-streak').textContent = '0';
      return;
    }

    for (var i = 0; i < uniqueDates.length; i++) {
      var entryD = uniqueDates[i];
      var diff = (checkDate - new Date(entryD.getFullYear(), entryD.getMonth(), entryD.getDate())) / (1000 * 60 * 60 * 24);
      if (diff === currentStreak || diff === (currentStreak + 1)) {
        currentStreak = Math.floor(diff) + 1;
      } else {
        break;
      }
    }
    document.getElementById('sd-stat-streak').textContent = currentStreak;
  }

    selectedMood = '📝';
    composeMoodContainer.querySelectorAll('.sd-compose-mood-btn').forEach(function(b) {
      b.classList.remove('sd-active');
      if (b.getAttribute('data-mood') === '📝') b.classList.add('sd-active');
    });

    saveBtn.disabled = true;
    composeSheet.classList.remove('sd-hidden');
    textarea.focus();
  }

  function openEditSheet(entry) {
    editingId = entry.id;
    sheetTitle.textContent = '編集';
    textarea.value = entry.text;
    
    inputTags.value = Array.isArray(entry.tags) ? entry.tags.map(function(t) { return '#' + t; }).join(' ') : '';
    
    var d = new Date(entry.ts);
    var tzOffset = d.getTimezoneOffset() * 60000;
    var localISOTime = (new Date(d.getTime() - tzOffset)).toISOString().slice(0, 16);
    inputDate.value = localISOTime;

    selectedMood = entry.mood || '📝';
    composeMoodContainer.querySelectorAll('.sd-compose-mood-btn').forEach(function(b) {
      b.classList.remove('sd-active');
      if (b.getAttribute('data-mood') === selectedMood) b.classList.add('sd-active');
    });

    selectedImages = Array.isArray(entry.images) ? entry.images.slice() : [];
    renderComposeMediaPreview();

    saveBtn.disabled = !textarea.value.trim();
    composeSheet.classList.remove('sd-hidden');
    textarea.focus();
  }

  function handleImageUpload(e) {
    var files = Array.from(e.target.files);
    files.forEach(function(file) {
      var reader = new FileReader();
      reader.onload = function(evt) {
        compressImage(evt.target.result, function(compressedBase64) {
          selectedImages.push(compressedBase64);
          renderComposeMediaPreview();
        });
      };
      reader.readAsDataURL(file);
    });
    mediaInput.value = '';
  }

  
  function compressImage(base64Str, callback) {
    var img = new Image();
    img.src = base64Str;
    img.onload = function() {
      var canvas = document.createElement('canvas');
      var MAX_WIDTH = 1000;
      var MAX_HEIGHT = 1000;
      var width = img.width;
      var height = img.height;

      if (width > height) {
        if (width > MAX_WIDTH) {
          height *= MAX_WIDTH / width;
          width = MAX_WIDTH;
        }
      } else {
        if (height > MAX_HEIGHT) {
          width *= MAX_HEIGHT / height;
          height = MAX_HEIGHT;
        }
      }
      canvas.width = width;
      canvas.height = height;
      var ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      
      var compressed = canvas.toDataURL('image/jpeg', 0.7);
      callback(compressed);
    };
  }

  function renderComposeMediaPreview() {
    mediaPreview.innerHTML = '';
    selectedImages.forEach(function(imgBase64, index) {
      var wrapper = document.createElement('div');
      wrapper.className = 'sd-media-thumb-wrapper';
      
      var img = document.createElement('img');
      img.className = 'sd-media-thumb';
      img.src = imgBase64;
      
      var del = document.createElement('button');
      del.className = 'sd-media-thumb-del';
      del.textContent = '×';
      del.addEventListener('click', function() {
        selectedImages.splice(index, 1);
        renderComposeMediaPreview();
      });

      wrapper.appendChild(img);
      wrapper.appendChild(del);
      mediaPreview.appendChild(wrapper);
    });
  }

  function saveComposeSheet() {
    var text = textarea.value.trim();
    if (!text) return;

    var inputTime = new Date(inputDate.value).getTime() || Date.now();
    var textTags = extractTags(inputTags.value);
    var inlineTags = extractTags(text);
    var combinedTags = Array.from(new Set(textTags.concat(inlineTags)));

    var entry = {
      id: editingId || generateId(),
      text: text,
      mood: selectedMood,
      ts: inputTime,
      images: selectedImages,
      favorite: false,
      tags: combinedTags
    };

    if (editingId) {
      dbGetAll(function(entries) {
        var old = entries.find(function(e) { return e.id === editingId; });
        if (old) entry.favorite = old.favorite;
        
        dbPut(entry, function() {
          composeSheet.classList.add('sd-hidden');
          renderTimeline();
          if (currentTab === 'calendar') {
            renderCalendarDays();
            renderCalendarFocusedList();
          }
        });
      });
    } else {
      dbPut(entry, function() {
        composeSheet.classList.add('sd-hidden');
        renderTimeline();
        if (currentTab === 'calendar') {
          renderCalendarDays();
          renderCalendarFocusedList();
        }
      });
    }
  }

  
  
  function exportData() {
    dbGetAll(function(entries) {
      var exportPayload = {
        app: 'SecretDiary',
        exportedAt: new Date().toISOString(),
        entries: entries
      };
      var blob = new Blob([JSON.stringify(exportPayload, null, 2)], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'backup_' + new Date().toISOString().split('T')[0] + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  }

  function importData(e) {
    var file = e.target.files[0];
    if (!file) return;
    
    var reader = new FileReader();
    reader.onload = function(evt) {
      try {
        var imported = JSON.parse(evt.target.result);
        if (imported.app === 'SecretDiary' && Array.isArray(imported.entries)) {
          if (confirm(imported.entries.length + ' 件の日記を読み込みます。よろしいですか？')) {
            var transaction = db.transaction([STORE_NAME], 'readwrite');
            var store = transaction.objectStore(STORE_NAME);
            imported.entries.forEach(function(entry) {
              store.put(entry);
            });
            transaction.oncomplete = function() {
              alert('インポートが完了しました。');
              renderTimeline();
              renderStats();
              renderCalendarDays();
            };
          }
        } else {
          alert('非対応のファイル形式です。');
        }
      } catch(err) {
        alert('ファイルの読み込みに失敗しました。');
      }
    };
    reader.readAsText(file);
    importFile.value = '';
  }

  function clearAllData() {
    if (confirm('重要: すべての日記、写真、タグが完全に削除されます。よろしいですか？')) {
      if (confirm('本当によろしいですか？この操作は取り消せません。')) {
        dbClearAll(function() {
          localStorage.removeItem('sd_pin_lock_enabled');
          localStorage.removeItem('sd_pin_lock_hash');
          alert('すべてのデータを削除しました。');
          window.location.reload();
        });
      }
    }
  }

  
  
  function checkPinLockOnLaunch() {
    var isEnabled = localStorage.getItem('sd_pin_lock_enabled') === 'true';
    var pinHash = localStorage.getItem('sd_pin_lock_hash');
    
    if (isEnabled && pinHash) {
      lockScreen.classList.remove('sd-hidden');
      overlay.classList.add('sd-hidden');
      enteredPin = "";
      updatePinDots();
    } else {
      lockScreen.classList.add('sd-hidden');
      overlay.classList.remove('sd-hidden');
      initDB(function() {
        renderTimeline();
        initSyncKey();
      });
    }
  }

  function updatePinDots() {
    var dots = pinDotsContainer.querySelectorAll('.sd-pin-dot');
    dots.forEach(function(dot, idx) {
      if (idx < enteredPin.length) {
        dot.classList.add('sd-filled');
      } else {
        dot.classList.remove('sd-filled');
      }
    });
  }

  function handleKeypadPress(val) {
    if (enteredPin.length < 4) {
      enteredPin += val;
      updatePinDots();
      
      if (enteredPin.length === 4) {
        setTimeout(verifyPin, 180);
      }
    }
  }

  function verifyPin() {
    var storedHash = localStorage.getItem('sd_pin_lock_hash');
    var inputHash = simpleHash(enteredPin);
    
    if (inputHash === storedHash) {
      lockScreen.classList.add('sd-hidden');
      overlay.classList.remove('sd-hidden');
      initDB(function() {
        renderTimeline();
        initSyncKey();
      });
    } else {
      pinDotsContainer.classList.add('sd-keypad-shake');
      
      setTimeout(function() {
        pinDotsContainer.classList.remove('sd-keypad-shake');
        enteredPin = "";
        updatePinDots();
      }, 400);
    }
  }

  function simpleHash(str) {
    var hash = 0;
    for (var i = 0; i < str.length; i++) {
      hash = ((hash << 5) - hash) + str.charCodeAt(i);
      hash |= 0;
    }
    return 'h_' + hash;
  }

  function setupPinSetupModal() {
    pinSetupInput1.value = "";
    pinSetupInput2.value = "";
    pinSetupModal.classList.remove('sd-hidden');
    pinSetupInput1.focus();
  }

  function savePinSetup() {
    var pin1 = pinSetupInput1.value;
    var pin2 = pinSetupInput2.value;

    if (pin1.length !== 4 || !/^\d+$/.test(pin1)) {
      alert('パスコードは4桁の数字で入力してください。');
      return;
    }
    if (pin1 !== pin2) {
      alert('確認用のパスコードが一致しません。');
      return;
    }

    localStorage.setItem('sd_pin_lock_enabled', 'true');
    localStorage.setItem('sd_pin_lock_hash', simpleHash(pin1));
    pinSetupModal.classList.add('sd-hidden');
    
    lockToggle.checked = true;
    changePinRow.classList.remove('sd-hidden');
    alert('パスコードを設定しました。');
  }

  
  
  function initEventListeners() {
    fab.addEventListener('click', function() {
      openNewComposeSheet(currentTab === 'calendar' ? calendarSelectedDate : new Date());
    });
    
    closeBtn.addEventListener('click', function() {
      overlay.classList.add('sd-closing');
      setTimeout(function() {
        window.location.href = '../';
      }, 300);
    });

    cancelBtn.addEventListener('click', function() { composeSheet.classList.add('sd-hidden'); });
    saveBtn.addEventListener('click', saveComposeSheet);
    
    textarea.addEventListener('input', function() {
      saveBtn.disabled = !textarea.value.trim();
    });

    document.querySelectorAll('.sd-editor-tool').forEach(function(tool) {
      tool.addEventListener('click', function() {
        var wrap = tool.getAttribute('data-wrap');
        var start = textarea.selectionStart;
        var end = textarea.selectionEnd;
        var text = textarea.value;
        
        var selected = text.substring(start, end);
        var replacement = wrap + (selected || 'text') + wrap;
        textarea.value = text.substring(0, start) + replacement + text.substring(end);
        
        textarea.focus();
        textarea.selectionStart = start + wrap.length;
        textarea.selectionEnd = start + wrap.length + (selected ? selected.length : 4);
        saveBtn.disabled = !textarea.value.trim();
      });
    });

    composeMoodContainer.addEventListener('click', function(e) {
      var btn = e.target.closest('.sd-compose-mood-btn');
      if (!btn) return;
      composeMoodContainer.querySelectorAll('.sd-compose-mood-btn').forEach(function(b) {
        b.classList.remove('sd-active');
      });
      btn.classList.add('sd-active');
      selectedMood = btn.getAttribute('data-mood');
    });

    mediaTrigger.addEventListener('click', function() { mediaInput.click(); });
    mediaInput.addEventListener('change', handleImageUpload);

    tabButtons.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var targetTab = btn.getAttribute('data-tab');
        if (targetTab === currentTab) return;

        tabButtons.forEach(function(b) { b.classList.remove('sd-active'); });
        tabContents.forEach(function(c) { c.classList.remove('sd-active'); });
        
        btn.classList.add('sd-active');
        document.getElementById('sd-tab-' + targetTab).classList.add('sd-active');
        
        currentTab = targetTab;
        
        if (currentTab === 'timeline') {
          headerTitleText.textContent = '日記';
          headerActionsTimeline.style.display = 'flex';
          fab.style.display = 'flex';
          renderTimeline();
        } else if (currentTab === 'calendar') {
          headerTitleText.textContent = 'カレンダー';
          headerActionsTimeline.style.display = 'none';
          searchBar.classList.add('sd-hidden');
          fab.style.display = 'none';
          renderCalendarDays();
          renderCalendarFocusedList();
        } else if (currentTab === 'gaman') {
          headerTitleText.textContent = '我慢';
          headerActionsTimeline.style.display = 'none';
          searchBar.classList.add('sd-hidden');
          fab.style.display = 'none';
          renderGaman();
        } else if (currentTab === 'stats') {
          headerTitleText.textContent = '統計';
          headerActionsTimeline.style.display = 'none';
          searchBar.classList.add('sd-hidden');
          fab.style.display = 'none';
          renderStats();
        } else if (currentTab === 'settings') {
          headerTitleText.textContent = '設定';
          headerActionsTimeline.style.display = 'none';
          searchBar.classList.add('sd-hidden');
          fab.style.display = 'none';
        }
      });
    });

    calPrevBtn.addEventListener('click', function() {
      calendarDate.setMonth(calendarDate.getMonth() - 1);
      renderCalendarDays();
    });
    calNextBtn.addEventListener('click', function() {
      calendarDate.setMonth(calendarDate.getMonth() + 1);
      renderCalendarDays();
    });
    calendarAddBtn.addEventListener('click', function() {
      openNewComposeSheet(calendarSelectedDate);
    });

    
    gamanTrigger.addEventListener('click', incrementGaman);
    gamanResetBtn.addEventListener('click', resetGaman);
    gamanHistoryBtn.addEventListener('click', function() {
      renderGamanHistory();
      gamanHistoryModal.classList.remove('sd-hidden');
    });
    gamanHistoryClose.addEventListener('click', function() {
      gamanHistoryModal.classList.add('sd-hidden');
    });
    gamanHistoryModal.addEventListener('click', function(e) {
      if (e.target === gamanHistoryModal) gamanHistoryModal.classList.add('sd-hidden');
    });

    
    gamanSyncSaveBtn.addEventListener('click', handleSyncButtonClick);

    searchToggle.addEventListener('click', function() {
      searchBar.classList.toggle('sd-hidden');
      if (!searchBar.classList.contains('sd-hidden')) {
        searchInput.focus();
      } else {
        searchInput.value = '';
        currentSearchQuery = '';
        renderTimeline();
      }
    });
    searchInput.addEventListener('input', function() {
      currentSearchQuery = searchInput.value;
      renderTimeline();
    });
    
    favFilterToggle.addEventListener('click', function() {
      showFavoritesOnly = !showFavoritesOnly;
      favFilterToggle.classList.toggle('sd-active', showFavoritesOnly);
      renderTimeline();
    });

    document.querySelectorAll('.sd-key-btn[data-val]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        handleKeypadPress(btn.getAttribute('data-val'));
      });
    });
    document.getElementById('sd-pin-delete').addEventListener('click', function() {
      if (enteredPin.length > 0) {
        enteredPin = enteredPin.slice(0, -1);
        updatePinDots();
      }
    });

    lockToggle.addEventListener('change', function() {
      if (lockToggle.checked) {
        setupPinSetupModal();
      } else {
        localStorage.removeItem('sd_pin_lock_enabled');
        localStorage.removeItem('sd_pin_lock_hash');
        changePinRow.classList.add('sd-hidden');
        alert('パスコードロックを解除しました。');
      }
    });
    changePinBtn.addEventListener('click', setupPinSetupModal);
    
    pinSetupCancel.addEventListener('click', function() {
      pinSetupModal.classList.add('sd-hidden');
      var isCurrentlyEnabled = localStorage.getItem('sd_pin_lock_enabled') === 'true';
      lockToggle.checked = isCurrentlyEnabled;
    });
    pinSetupSave.addEventListener('click', savePinSetup);

    exportBtn.addEventListener('click', exportData);
    importTrigger.addEventListener('click', function() { importFile.click(); });
    importFile.addEventListener('change', importData);
    clearAllBtn.addEventListener('click', clearAllData);
  }

  
  
  function loadSettingsConfig() {
    var isEnabled = localStorage.getItem('sd_pin_lock_enabled') === 'true';
    lockToggle.checked = isEnabled;
    if (isEnabled) {
      changePinRow.classList.remove('sd-hidden');
    } else {
      changePinRow.classList.add('sd-hidden');
    }
  }

  loadSettingsConfig();
  initEventListeners();
  checkPinLockOnLaunch();

})();
</script>


</body>
